<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-End Travel Packer - Ultimate Edition</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* --- DARK MODE --- */
        :root {
            --bg-dark: #0f1115;
            --accent-gold: #ffc107;
            --accent-gold-hover: #e0a800;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --success-green: #2ea043;
            --danger-red: #da3633;
            
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --glass-blur: blur(25px) saturate(150%);
            
            --input-bg: rgba(0,0,0,0.4);
            --modal-bg: rgba(15, 17, 21, 0.85);
            --blob-opacity: 0.4;
        }

        /* --- LIGHT MODE --- */
        body.light-mode {
            --bg-dark: #f0f4f8;
            --accent-gold: #d99600;
            --text-main: #111827;
            --text-muted: #64748b;
            
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            
            --input-bg: rgba(255, 255, 255, 0.7);
            --modal-bg: rgba(240, 244, 248, 0.85);
            --blob-opacity: 0.7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; transition: 0.4s; }

        /* Ambient Blobs */
        .ambient-blob { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: var(--blob-opacity); animation: float 20s infinite alternate; transition: opacity 0.4s; }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(255, 193, 7, 0.15); animation-delay: 0s; }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: rgba(46, 160, 67, 0.1); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 60%; width: 40vw; height: 40vw; background: rgba(56, 110, 200, 0.1); animation-delay: -10s; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(5%, 10%) scale(1.1); } }

        /* Glass Panel */
        .glass-panel { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: var(--glass-shadow); padding: 25px; transition: 0.4s; }

        .app-container { max-width: 1400px; margin: 0 auto; padding: 20px 20px 100px 20px; }

        /* --- HEADER --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; margin-bottom: 30px; position: sticky; top: 20px; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--accent-gold); display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 10px; flex-wrap: wrap;}

        button { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--glass-border); padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        button:hover { background: rgba(255,255,255,0.1); transform: scale(1.02); }
        button.primary { background: linear-gradient(135deg, var(--accent-gold), #d4a000); color: #000; border: none; box-shadow: 0 4px 15px rgba(255,193,7,0.3); }
        button.primary:hover { box-shadow: 0 6px 20px rgba(255,193,7,0.4); transform: scale(1.03); }
        button.icon-btn { padding: 10px; justify-content: center; }
        
        .mic-btn { background: rgba(74, 165, 255, 0.1); color: #4aa5ff; border-color: rgba(74, 165, 255, 0.3); }
        body.light-mode .mic-btn { background: rgba(0, 102, 204, 0.1); color: #0066cc; }
        .mic-btn.recording { animation: pulseMic 1.5s infinite; background: var(--danger-red); color: white; border-color: var(--danger-red);}

        @keyframes pulseMic { 0% { box-shadow: 0 0 0 0 rgba(218, 54, 51, 0.7); } 70% { box-shadow: 0 0 0 12px rgba(218, 54, 51, 0); } 100% { box-shadow: 0 0 0 0 rgba(218, 54, 51, 0); } }
        .hidden { display: none; }

        /* --- TOASTS --- */
        #toastContainer { position: fixed; top: 90px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none;}
        .toast { background: rgba(25, 30, 40, 0.9); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); color: white; padding: 12px 20px; border-radius: 30px; font-size: 0.9rem; font-weight: 500; box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px; animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        body.light-mode .toast { background: rgba(255,255,255,0.9); color: black; }
        @keyframes slideDown { 0% { opacity: 0; transform: translateY(-20px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes fadeOut { 100% { opacity: 0; transform: translateY(-10px) scale(0.9); } }

        /* --- LAYOUT GRID --- */
        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; align-items: start; }

        .form-group { margin-bottom: 15px; }
        .row-group { display: flex; gap: 12px; }
        .row-group .form-group { flex: 1; }
        label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
        input[type="text"], input[type="number"], input[type="date"], select { width: 100%; background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-main); padding: 12px 15px; border-radius: 12px; font-size: 0.95rem; transition: 0.2s; color-scheme: dark;}
        body.light-mode input[type="date"] { color-scheme: light; }
        input:focus, select:focus { outline: none; border-color: var(--accent-gold); background: rgba(255,255,255,0.05); }

        input[type="color"] { -webkit-appearance: none; border: none; width: 100%; height: 44px; border-radius: 12px; cursor: pointer; padding: 0; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid var(--glass-border); border-radius: 12px; }

        /* Categories Cloud */
        .category-cloud { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .cat-tag { background: var(--input-bg); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .cat-tag button { background: none; border: none; color: var(--text-muted); padding: 0; cursor: pointer; box-shadow: none; min-width: auto;}
        .cat-tag button:hover { color: var(--danger-red); background: none;}

        /* --- WEATHER DASHBOARD (mit Graphen) --- */
        .weather-dashboard { margin-bottom: 30px; }
        .weather-search { display: flex; gap: 10px; margin-bottom: 20px; }
        
        .forecast-chart { display: flex; justify-content: space-between; align-items: flex-end; height: 140px; margin-top: 25px; padding-bottom: 10px; border-bottom: 1px solid var(--glass-border); }
        .chart-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1; height: 100%; position: relative; gap: 5px;}
        .bar-wrapper { position: relative; width: 14px; height: 80px; background: rgba(255,255,255,0.05); border-radius: 7px; display: flex; align-items: flex-end; border: 1px solid rgba(255,255,255,0.05);}
        .temp-bar { width: 100%; background: linear-gradient(0deg, var(--accent-gold), #ff8c00); border-radius: 7px; transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); height: 0%;}
        .chart-icon { font-size: 1.2rem; margin-bottom: 5px; color: var(--text-main);}
        .chart-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; font-weight: 600;}
        .chart-temp { position: absolute; top: -20px; font-size: 0.8rem; font-weight: 600; width: 100%; text-align: center;}

        /* Smart Suggestions */
        .smart-suggestions { margin-top: 15px; padding-top: 15px; }
        .s-tag { background: rgba(46, 160, 67, 0.15); border: 1px solid rgba(46, 160, 67, 0.3); color: var(--success-green); padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; margin: 5px 5px 0 0;}
        .s-tag:hover { background: rgba(46, 160, 67, 0.3); }

        /* --- THE HALL (Luggage) --- */
        .section-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .luggage-area { display: flex; flex-wrap: wrap; gap: 40px; }
        
        .luggage-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .luggage-wrapper:hover { transform: translateY(-10px) scale(1.03); filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3)); }

        .luggage-info-tag { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-bottom: 2px solid var(--accent-gold); border-radius: 14px; padding: 12px 18px; margin-bottom: 20px; text-align: center; backdrop-filter: var(--glass-blur); color: var(--text-main); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        body.light-mode .luggage-info-tag { background: rgba(255,255,255,0.5); border-color: rgba(0,0,0,0.1); color: black;}
        .luggage-info-tag h3 { font-size: 1.05rem; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; justify-content: center;}

        /* Visual Luggage Models - Extreme Colored Glass */
        .luggage-body { position: relative; backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); }
        
        .mini-progress { position: absolute; bottom: 15px; left: 15%; width: 70%; height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); z-index: 5;}
        .mini-progress-fill { background: var(--accent-gold); height: 100%; transition: 0.4s;}

        .luggage-type-trolley .luggage-body { border-radius: 18px; }
        .luggage-type-trolley .luggage-body::before { content: ''; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 35%; height: 20px; border: 4px solid rgba(255,255,255,0.15); border-bottom: none; border-radius: 8px 8px 0 0; }
        .luggage-type-trolley .luggage-body::after { content: ''; position: absolute; bottom: -12px; left: 15%; width: 70%; height: 12px; border-left: 14px solid rgba(255,255,255,0.1); border-right: 14px solid rgba(255,255,255,0.1); }

        .luggage-type-koffer .luggage-body { border-radius: 12px; }
        .luggage-type-koffer .luggage-body::before { content: ''; position: absolute; top: 50%; right: -15px; transform: translateY(-50%); width: 15px; height: 60px; border: 4px solid rgba(255,255,255,0.15); border-left: none; border-radius: 0 8px 8px 0; }
        .koffer-strap { position: absolute; top: 0; left: 30%; width: 10%; height: 100%; background: rgba(255,255,255,0.05); border-left: 1px solid rgba(255,255,255,0.08); border-right: 1px solid rgba(255,255,255,0.08);}
        .koffer-strap-2 { left: 60%; }

        .luggage-type-rucksack .luggage-body { border-radius: 40% 40% 15% 15% / 25% 25% 10% 10%; }
        .luggage-type-rucksack .luggage-body::before { content: ''; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 25%; height: 14px; border: 4px solid rgba(255,255,255,0.15); border-bottom: none; border-radius: 10px 10px 0 0; }
        .luggage-type-rucksack .luggage-body::after { content: ''; position: absolute; top: 20%; left: 15%; width: 70%; height: 50%; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px 20px 15px 15px; box-shadow: inset 0 4px 10px rgba(255,255,255,0.03); }

        /* --- THE MODAL --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content { background: var(--modal-bg); border: 1px solid rgba(255,255,255,0.1); width: 95%; max-width: 800px; max-height: 90vh; border-radius: 24px; display: flex; flex-direction: column; box-shadow: 0 30px 60px rgba(0,0,0,0.5); transform: scale(0.95); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; backdrop-filter: var(--glass-blur); }
        .modal-overlay.active .modal-content { transform: scale(1); }

        .modal-header { padding: 25px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2);}
        .close-modal { background: none; border: none; font-size: 1.8rem; color: var(--text-muted); cursor: pointer; transition: 0.2s;}
        .close-modal:hover { color: var(--text-main); transform: rotate(90deg);}

        .modal-body { padding: 25px; overflow-y: auto; flex-grow: 1; }
        
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.2); margin-bottom: 10px; border-radius: 12px; border-left: 4px solid var(--accent-gold); transition: 0.2s; border: 1px solid var(--glass-border); }
        .list-item:hover { background: rgba(0,0,0,0.4); transform: translateX(5px); }
        .list-item.packed { opacity: 0.5; border-left-color: var(--success-green); }
        .list-item.packed .item-name { text-decoration: line-through; }
        .item-left { display: flex; align-items: center; gap: 15px; }
        .item-left input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--success-green); cursor: pointer;}
        
        .modal-footer { padding: 20px 25px; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); display: flex; gap: 10px; }

        @media (max-width: 900px) {
            .app-container { padding: 10px 10px 80px 10px; }
            header { flex-direction: column; gap: 15px; padding: 15px; border-radius: 20px; position: relative; top: 0; margin-bottom: 20px;}
            .header-actions { justify-content: center; width: 100%;}
            .layout { grid-template-columns: 1fr; gap: 20px; }
            .luggage-area { justify-content: center; }
            .modal-footer { flex-direction: column; }
            .modal-footer button { padding: 15px; justify-content: center;}
            .forecast-chart { height: 120px; overflow-x: auto; padding-bottom: 15px;}
            .chart-col { min-width: 50px; }
        }
    </style>
</head>
<body>

    <!-- Ambient Blobs -->
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
    <div class="ambient-blob blob-3"></div>

    <div id="toastContainer"></div>

    <div class="app-container">
        <!-- HEADER -->
        <header class="glass-panel" style="padding: 15px 25px;">
            <div class="logo"><i class="fa-solid fa-plane-departure"></i> iOS Packer</div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleTheme()" title="Tag/Nacht" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
                <button class="mic-btn" onclick="startVoiceCommand()" id="voiceBtn" title="KI Sprachsteuerung"><i class="fa-solid fa-microphone"></i> Sprachbefehl</button>
                <div style="width: 1px; height: 30px; background: var(--glass-border); margin: 0 5px;"></div>
                <button onclick="document.getElementById('importData').click()"><i class="fa-solid fa-file-import"></i> Import</button>
                <input type="file" id="importData" class="hidden" accept=".json" onchange="importData(event)">
                <button onclick="exportData()"><i class="fa-solid fa-file-export"></i> Export</button>
                <button class="primary" onclick="generatePDF()"><i class="fa-solid fa-file-pdf"></i> Editorial PDF</button>
            </div>
        </header>

        <main class="layout">
            <!-- LEFT COLUMN -->
            <div class="left-column">
                
                <div class="glass-panel" style="margin-bottom: 25px;">
                    <div class="section-title" style="font-size: 1.1rem; margin-bottom: 15px;"><i class="fa-solid fa-gauge-high"></i> Reise-Fortschritt</div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px;">
                        <span style="color: var(--text-muted);">Gepackt</span><span id="globalProgressText" style="color: var(--accent-gold); font-weight: bold;">0%</span>
                    </div>
                    <div style="height: 10px; background: rgba(0,0,0,0.3); border-radius: 5px; overflow: hidden; border: 1px solid var(--glass-border);">
                        <div id="globalProgressBar" style="height: 100%; width: 0%; background: linear-gradient(90deg, var(--success-green), #4add6d); transition: 0.5s;"></div>
                    </div>
                </div>

                <div class="glass-panel" style="margin-bottom: 25px;">
                    <div class="section-title" style="font-size: 1.1rem; margin-bottom: 15px;"><i class="fa-solid fa-box-open"></i> Neues Gepäck</div>
                    <div class="row-group">
                        <div class="form-group" style="flex: 2;"><label>Typ</label><select id="luggageType"><option value="koffer">Koffer</option><option value="trolley">Trolley</option><option value="rucksack">Rucksack</option></select></div>
                        <div class="form-group" style="flex: 1;"><label>Farbe</label><input type="color" id="luggageColor" value="#ffc107"></div>
                    </div>
                    <div class="form-group"><label>Name</label><input type="text" id="luggageName" placeholder="Z.B. Barcelona Trip"></div>
                    <div class="row-group">
                        <div class="form-group"><label>Breite (cm)</label><input type="number" id="luggageW" value="40"></div>
                        <div class="form-group"><label>Höhe (cm)</label><input type="number" id="luggageH" value="55"></div>
                    </div>
                    <div class="row-group">
                        <div class="form-group"><label>Max. Gewicht (kg)</label><input type="number" id="luggageWeight" value="10"></div>
                        <div class="form-group"><label>Frist / Datum</label><input type="date" id="luggageDeadline"></div>
                    </div>
                    <button class="primary" style="width: 100%; justify-content: center; padding: 14px; margin-top: 10px;" onclick="addLuggage()"><i class="fa-solid fa-plus"></i> Hinzufügen</button>
                </div>

                <div class="glass-panel">
                    <div class="section-title" style="font-size: 1.1rem; margin-bottom: 15px;"><i class="fa-solid fa-tags"></i> Kategorien</div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="newCategory" placeholder="Neue Kategorie...">
                        <button class="primary icon-btn" onclick="addCategory()"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div class="category-cloud" id="categoryCloud"></div>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="right-column">
                
                <!-- NEW: Weather Dashboard with Graphs -->
                <div class="glass-panel weather-dashboard">
                    <div class="section-title"><i class="fa-solid fa-satellite-dish" style="color: var(--accent-gold);"></i> Live Wetter & KI Assistent</div>
                    <div class="weather-search">
                        <input type="text" id="weatherCity" placeholder="Reiseziel eingeben (z.B. Rom)..." onkeypress="if(event.key === 'Enter') fetchWeather()">
                        <button class="primary" onclick="fetchWeather()" id="weatherBtn"><i class="fa-solid fa-magnifying-glass"></i> Abrufen</button>
                    </div>
                    
                    <div id="forecastContainer" style="display: none;">
                        <div class="forecast-chart" id="forecastChart">
                            <!-- JS will inject the bar chart here -->
                        </div>
                        <div class="smart-suggestions" id="smartSuggestions">
                            <label><i class="fa-solid fa-wand-magic-sparkles" style="color: var(--accent-gold);"></i> KI Pack-Vorschläge (Klick zum Packen):</label>
                            <div class="category-cloud" id="suggestionTags"></div>
                        </div>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 40px; margin-left: 10px;"><i class="fa-solid fa-warehouse"></i> Packhalle</div>
                <div class="luggage-area" id="hallArea"></div>
            </div>
        </main>
    </div>

    <!-- LUGGAGE MODAL -->
    <div class="modal-overlay" id="luggageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle" style="color: var(--accent-gold); font-size: 1.5rem; display: flex; align-items: center; gap: 10px;"></h2>
                <div style="display: flex; gap: 10px;">
                    <button class="icon-btn" style="border-color: var(--danger-red); color: var(--danger-red); background: rgba(218,54,51,0.1);" onclick="deleteCurrentLuggage()"><i class="fa-solid fa-trash-can"></i></button>
                    <button class="close-modal" onclick="closeModal('luggageModal')"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            <div class="modal-body">
                <!-- Info Bar in Modal -->
                <div style="display: flex; gap: 20px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border); font-size: 0.9rem; color: var(--text-muted);">
                    <span id="modalDim"></span>
                    <span id="modalWeight"></span>
                    <span id="modalDeadline"></span>
                </div>
                <div id="modalItemsList"></div>
            </div>
            <div class="modal-footer">
                <input type="text" id="modalNewItem" placeholder="Gegenstand..." onkeypress="if(event.key === 'Enter') addItemToCurrentLuggage()">
                <select id="modalCatSelect" style="max-width: 150px;"></select>
                <button class="primary" onclick="addItemToCurrentLuggage()"><i class="fa-solid fa-plus"></i> Packen</button>
            </div>
        </div>
    </div>

    <script>
        // --- STATE ---
        let categories = ["Kleidung", "Hygiene", "Elektronik", "Dokumente", "Zubehör"];
        let luggages = [];
        let currentOpenLuggageId = null;

        window.onload = () => {
            if(localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeBtn').innerHTML = '<i class="fa-solid fa-sun"></i>';
            }
            updateCategoryUI(); updateDashboard(); renderHall();
        };

        // --- HELPER ---
        function hexToRgbA(hex, alpha){
            let c;
            if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
                c= hex.substring(1).split('');
                if(c.length === 3) c= [c[0], c[0], c[1], c[1], c[2], c[2]];
                c= '0x'+c.join('');
                return 'rgba('+[(c>>16)&255, (c>>8)&255, c&255].join(',')+','+alpha+')';
            }
            return `rgba(255,255,255,${alpha})`;
        }
        
        function hexToRgbArray(hex) {
            if(!hex) return [200, 200, 200];
            let c = hex.substring(1).split('');
            if(c.length === 3) c = [c[0], c[0], c[1], c[1], c[2], c[2]];
            c = '0x' + c.join('');
            return [(c>>16)&255, (c>>8)&255, c&255];
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div'); toast.className = 'toast';
            let icon = '<i class="fa-solid fa-check-circle" style="color: var(--success-green);"></i>';
            if(type === 'error') icon = '<i class="fa-solid fa-triangle-exclamation" style="color: var(--danger-red);"></i>';
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'fadeOut 0.4s forwards'; setTimeout(() => toast.remove(), 400); }, 3500);
        }

        function toggleTheme() {
            const body = document.body; const btn = document.getElementById('themeBtn');
            body.classList.toggle('light-mode');
            if(body.classList.contains('light-mode')) { btn.innerHTML = '<i class="fa-solid fa-sun"></i>'; localStorage.setItem('theme', 'light'); } 
            else { btn.innerHTML = '<i class="fa-solid fa-moon"></i>'; localStorage.setItem('theme', 'dark'); }
        }

        // --- WEATHER & KI ASSISTANT ---
        async function fetchWeather() {
            const city = document.getElementById('weatherCity').value.trim();
            if(!city) return;
            
            const btn = document.getElementById('weatherBtn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Lade...`;

            try {
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=de`);
                const geoData = await geoRes.json();
                if(!geoData.results) { showToast("Ort nicht gefunden!", "error"); btn.innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> Abrufen`; return; }
                
                const lat = geoData.results[0].latitude; const lon = geoData.results[0].longitude;

                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto`);
                const wData = await wRes.json();

                renderForecastGraph(wData.daily);
                generateSmartSuggestions(wData.daily);

                document.getElementById('forecastContainer').style.display = 'block';
            } catch (err) { showToast("Fehler beim Abrufen der Daten.", "error"); }
            btn.innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> Abrufen`;
        }

        function renderForecastGraph(daily) {
            const chart = document.getElementById('forecastChart');
            chart.innerHTML = '';
            const days = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];
            
            // Find max temp to scale the bars correctly
            const globalMax = Math.max(...daily.temperature_2m_max.slice(0, 5));
            const globalMin = Math.min(...daily.temperature_2m_min.slice(0, 5));
            const tempRange = Math.max(globalMax - Math.min(0, globalMin), 1); // Avoid div by 0

            for(let i=0; i<5; i++) {
                const date = new Date(daily.time[i]);
                const dayName = i === 0 ? 'Heute' : days[date.getDay()];
                const max = Math.round(daily.temperature_2m_max[i]);
                const min = Math.round(daily.temperature_2m_min[i]);
                const rain = daily.precipitation_probability_max[i];
                const code = daily.weathercode[i];

                let icon = 'fa-cloud'; let color = '#aaa';
                if(code === 0) { icon = 'fa-sun'; color = '#ffc107'; }
                else if(code <= 3) { icon = 'fa-cloud-sun'; color = '#ffd54f'; }
                else if(code <= 67) { icon = 'fa-cloud-rain'; color = '#4aa5ff'; }
                else if(code <= 77) { icon = 'fa-snowflake'; color = '#fff'; }
                else if(code >= 95) { icon = 'fa-cloud-bolt'; color = '#ffeb3b'; }

                // Calculate percentage height for the bar based on global max
                const heightPercent = Math.max((max / globalMax) * 100, 10); // at least 10%

                chart.innerHTML += `
                    <div class="chart-col">
                        <span class="chart-temp">${max}° <span style="color:var(--text-muted); font-size: 0.7rem;">${min}°</span></span>
                        <div class="bar-wrapper">
                            <div class="temp-bar" style="height: 0%;" data-target="${heightPercent}%"></div>
                        </div>
                        <i class="fa-solid ${icon} chart-icon" style="color: ${color}"></i>
                        <span class="chart-label">${dayName}</span>
                        <span style="font-size: 0.65rem; color: #4aa5ff;">${rain}% 🌧</span>
                    </div>
                `;
            }

            // Animate bars
            setTimeout(() => {
                document.querySelectorAll('.temp-bar').forEach(bar => {
                    bar.style.height = bar.getAttribute('data-target');
                });
            }, 100);
        }

        function generateSmartSuggestions(daily) {
            const tagsContainer = document.getElementById('suggestionTags');
            tagsContainer.innerHTML = '';
            
            let suggestions = new Set();
            const maxTemp = Math.max(...daily.temperature_2m_max.slice(0,5));
            const minTemp = Math.min(...daily.temperature_2m_min.slice(0,5));
            const maxRain = Math.max(...daily.precipitation_probability_max.slice(0,5));

            if(maxTemp > 25) { suggestions.add({n: 'Sonnencreme', c: 'Hygiene'}); suggestions.add({n: 'Badehose', c: 'Kleidung'}); suggestions.add({n: 'Sonnenbrille', c: 'Zubehör'});}
            if(minTemp < 10) { suggestions.add({n: 'Dicke Jacke', c: 'Kleidung'}); suggestions.add({n: 'Mütze', c: 'Kleidung'}); }
            if(maxRain > 40) { suggestions.add({n: 'Regenschirm', c: 'Zubehör'}); suggestions.add({n: 'Regenjacke', c: 'Kleidung'}); }
            suggestions.add({n: 'Reisepass', c: 'Dokumente'}); suggestions.add({n: 'Ladekabel', c: 'Elektronik'});

            suggestions.forEach(item => {
                if(!categories.includes(item.c)) item.c = categories[0];
                tagsContainer.innerHTML += `<div class="s-tag" onclick="quickAdd('${item.n}', '${item.c}')"><i class="fa-solid fa-plus"></i> ${item.n}</div>`;
            });
        }

        function quickAdd(name, cat) {
            if(luggages.length === 0) { showToast("Bitte erstelle zuerst ein Gepäckstück!", "error"); return; }
            const target = luggages[0]; 
            target.items.push({ id: Date.now().toString(), name: name, cat: cat, packed: false });
            showToast(`"${name}" in "${target.name}" gepackt`);
            renderHall(); updateDashboard();
        }

        // --- VOICE COMMAND ---
        function startVoiceCommand() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { showToast("Browser unterstützt kein Voice.", "error"); return; }
            if(luggages.length === 0) { showToast("Bitte erstelle zuerst ein Gepäckstück!", "error"); return; }

            const recognition = new SpeechRecognition();
            recognition.lang = 'de-DE'; recognition.interimResults = false; recognition.maxAlternatives = 1;
            const btn = document.getElementById('voiceBtn');
            btn.classList.add('recording'); btn.innerHTML = '<i class="fa-solid fa-ear-listen"></i> Höre zu...';

            recognition.start();
            recognition.onresult = (event) => processSmartVoiceCommand(event.results[0][0].transcript);
            recognition.onspeechend = () => recognition.stop();
            recognition.onend = () => { btn.classList.remove('recording'); btn.innerHTML = '<i class="fa-solid fa-microphone"></i> Sprachbefehl'; };
            recognition.onerror = (e) => showToast("Mikrofonfehler", "error");
        }

        function processSmartVoiceCommand(transcript) {
            let text = transcript.toLowerCase().trim().replace(/bitte/g, '').replace(/einmal/g, '').replace(/hinzu$/i, '').trim();
            text = text.replace(/^(füge|packe|tu|lege|schreibe)\s+(eine|einen|ein|den|die|das)?\s*/i, '');

            let itemName = text; let luggageQuery = "";
            const splitMatch = text.match(/(.+?)\s+(in den|in die|in das|in|zu dem|zu der|zum|zur|zu|auf den|auf)\s+(.+)/i);
            if(splitMatch) { itemName = splitMatch[1].trim(); luggageQuery = splitMatch[3].trim(); }
            if(!itemName) { showToast("Nichts verstanden.", "error"); return; }

            itemName = itemName.charAt(0).toUpperCase() + itemName.slice(1);
            let targetLuggage = null;

            if(luggageQuery) {
                const searchWords = luggageQuery.split(' ');
                targetLuggage = luggages.find(l => searchWords.some(w => w.length > 2 && l.name.toLowerCase().includes(w)));
            }
            if(!targetLuggage && luggages.length > 0) targetLuggage = luggages[0];

            if(targetLuggage) {
                targetLuggage.items.push({ id: Date.now().toString(), name: itemName, cat: categories[0], packed: false });
                showToast(`"${itemName}" in ${targetLuggage.name} gepackt`);
                renderHall(); updateDashboard();
                if(currentOpenLuggageId === targetLuggage.id) renderModalContent();
            } else { showToast("Gepäck nicht gefunden.", "error"); }
        }

        // --- DASHBOARD ---
        function updateDashboard() {
            let total = 0; let packed = 0;
            luggages.forEach(l => { total += l.items.length; packed += l.items.filter(i => i.packed).length; });
            const percent = total === 0 ? 0 : Math.round((packed / total) * 100);
            document.getElementById('globalProgressText').innerText = `${percent}%`;
            document.getElementById('globalProgressBar').style.width = `${percent}%`;
        }

        // --- CATEGORIES ---
        function updateCategoryUI() {
            const cloud = document.getElementById('categoryCloud'); const select = document.getElementById('modalCatSelect');
            cloud.innerHTML = ''; select.innerHTML = '';
            categories.forEach(cat => {
                cloud.innerHTML += `<div class="cat-tag">${cat} <button onclick="removeCategory('${cat}')"><i class="fa-solid fa-xmark"></i></button></div>`;
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        }
        function addCategory() {
            const val = document.getElementById('newCategory').value.trim();
            if (val && !categories.includes(val)) { categories.push(val); document.getElementById('newCategory').value = ''; updateCategoryUI(); }
        }
        function removeCategory(catToRemove) {
            if(categories.length <= 1) { showToast("Du brauchst mindestens eine Kategorie.", "error"); return; }
            if(confirm(`Kategorie "${catToRemove}" löschen?`)) { categories = categories.filter(c => c !== catToRemove); updateCategoryUI(); }
        }

        // --- LUGGAGE LOGIC ---
        function addLuggage() {
            const name = document.getElementById('luggageName').value.trim() || "Mein Gepäck";
            const type = document.getElementById('luggageType').value;
            const color = document.getElementById('luggageColor').value; 
            const w = parseInt(document.getElementById('luggageW').value) || 40;
            const h = parseInt(document.getElementById('luggageH').value) || 55;
            const weight = parseFloat(document.getElementById('luggageWeight').value) || 10;
            const deadline = document.getElementById('luggageDeadline').value; // NEU: Frist

            luggages.push({ id: Date.now().toString(), type, name, color, w, h, weight, deadline, items: [] });
            document.getElementById('luggageName').value = ''; document.getElementById('luggageDeadline').value = ''; 
            renderHall(); updateDashboard(); showToast(`Gepäck "${name}" erstellt!`);
        }
        function deleteCurrentLuggage() {
            if(confirm("Gepäckstück inkl. Inhalt wirklich löschen?")) {
                luggages = luggages.filter(l => l.id !== currentOpenLuggageId);
                closeModal('luggageModal'); renderHall(); updateDashboard(); showToast("Gelöscht.", "success");
            }
        }

        // --- RENDER HALL ---
        function renderHall() {
            const area = document.getElementById('hallArea'); area.innerHTML = '';
            if (luggages.length === 0) {
                area.innerHTML = `<div style="text-align:center; width:100%; margin-top:40px; color:var(--text-muted);"><i class="fa-solid fa-boxes-packing" style="font-size:3.5rem; opacity:0.2; margin-bottom:15px;"></i><p>Halle ist leer.</p></div>`; return;
            }

            luggages.forEach(l => {
                const scale = 3.5; const calcWidth = Math.max(l.w * scale, 120); const calcHeight = Math.max(l.h * scale, 140);
                let icon = l.type === 'rucksack' ? 'fa-backpack' : (l.type === 'koffer' ? 'fa-suitcase' : 'fa-suitcase-rolling');
                const t = l.items.length; const p = l.items.filter(i => i.packed).length; const percent = t === 0 ? 0 : (p / t) * 100;
                let details = ''; if(l.type === 'koffer') details = '<div class="koffer-strap"></div><div class="koffer-strap-2"></div>';

                const baseColor = l.color || '#ffffff';
                const glassBg = hexToRgbA(baseColor, 0.08); 
                const glassBorder = hexToRgbA(baseColor, 0.3);
                
                let deadlineHtml = l.deadline ? `<span style="display:block; font-size:0.7rem; color:var(--text-muted); margin-top:4px;"><i class="fa-regular fa-clock"></i> ${new Date(l.deadline).toLocaleDateString('de-DE')}</span>` : '';

                area.innerHTML += `
                    <div class="luggage-wrapper luggage-type-${l.type}" onclick="openModal('${l.id}')">
                        <div class="luggage-info-tag">
                            <h3><i class="fa-solid ${icon}"></i> ${l.name}</h3>
                            <span>${p}/${t} Items</span>
                            ${deadlineHtml}
                        </div>
                        <div class="luggage-body" style="width:${calcWidth}px; height:${calcHeight}px; background: linear-gradient(135deg, ${glassBg}, rgba(255,255,255,0.01)); border-color: ${glassBorder}; box-shadow: inset 0 2px 15px rgba(255,255,255,0.05), 0 10px 40px rgba(0,0,0,0.3);">
                            ${details}
                            <div class="mini-progress"><div class="mini-progress-fill" style="width:${percent}%"></div></div>
                        </div>
                    </div>
                `;
            });
        }

        // --- MODALS ---
        function openModal(id) { currentOpenLuggageId = id; renderModalContent(); document.getElementById('luggageModal').classList.add('active'); }
        function closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); if(modalId === 'luggageModal') currentOpenLuggageId = null; }

        function renderModalContent() {
            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            if(!lug) return;

            let icon = lug.type === 'rucksack' ? 'fa-backpack' : (lug.type === 'koffer' ? 'fa-suitcase' : 'fa-suitcase-rolling');
            document.getElementById('modalTitle').innerHTML = `<i class="fa-solid ${icon}"></i> ${lug.name}`;
            
            document.getElementById('modalDim').innerHTML = `<i class="fa-solid fa-ruler-combined"></i> ${lug.w}x${lug.h} cm`;
            document.getElementById('modalWeight').innerHTML = `<i class="fa-solid fa-weight-scale"></i> max ${lug.weight} kg`;
            document.getElementById('modalDeadline').innerHTML = lug.deadline ? `<i class="fa-regular fa-clock"></i> Frist: ${new Date(lug.deadline).toLocaleDateString('de-DE')}` : '';

            const listContainer = document.getElementById('modalItemsList'); listContainer.innerHTML = '';
            if(lug.items.length === 0) { listContainer.innerHTML = `<p style="text-align:center; color:var(--text-muted); margin: 40px 0;">Koffer ist noch leer.</p>`; return; }

            const allUsedCats = [...new Set(lug.items.map(i => i.cat))];
            allUsedCats.forEach(cat => {
                const catItems = lug.items.filter(i => i.cat === cat);
                if(catItems.length === 0) return;

                let html = `<div style="margin-bottom: 20px;"><div style="font-weight:600; color:var(--accent-gold); margin-bottom:10px; font-size:0.85rem; text-transform:uppercase; letter-spacing: 1px;">${cat}</div>`;
                catItems.forEach(item => {
                    html += `<div class="list-item ${item.packed ? 'packed' : ''}">
                                <div class="item-left"><input type="checkbox" ${item.packed ? 'checked' : ''} onchange="toggleItem('${item.id}')"><span class="item-name">${item.name}</span></div>
                                <button style="background:none; border:none; color:var(--danger-red); font-size:1.2rem; padding:5px; cursor:pointer;" onclick="deleteItem('${item.id}')"><i class="fa-solid fa-xmark"></i></button>
                            </div>`;
                });
                html += `</div>`; listContainer.innerHTML += html;
            });
        }

        function addItemToCurrentLuggage() {
            const input = document.getElementById('modalNewItem'); const cat = document.getElementById('modalCatSelect').value; const name = input.value.trim();
            if(!name || !currentOpenLuggageId) return;
            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            lug.items.push({ id: Date.now().toString(), name: name, cat: cat, packed: false });
            input.value = ''; input.focus(); renderModalContent(); renderHall(); updateDashboard();
        }
        function toggleItem(id) { const lug = luggages.find(l => l.id === currentOpenLuggageId); const item = lug.items.find(i => i.id === id); if(item) item.packed = !item.packed; renderModalContent(); renderHall(); updateDashboard(); }
        function deleteItem(id) { const lug = luggages.find(l => l.id === currentOpenLuggageId); lug.items = lug.items.filter(i => i.id !== id); renderModalContent(); renderHall(); updateDashboard(); }

        // --- IMPORT / EXPORT ---
        function exportData() { downloadJSON({ categories, luggages }, 'reisedaten_koffer.json'); showToast("Erfolgreich exportiert!", "success");}
        function importData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = e => { 
                try { 
                    const data = JSON.parse(e.target.result);
                    if (data && data.luggages) {
                        if(data.categories) categories = data.categories; luggages = data.luggages;
                        updateCategoryUI(); renderHall(); updateDashboard(); showToast("Daten nahtlos importiert!", "success");
                    } else showToast("Falsches Dateiformat.", "error");
                } catch (err) { showToast("Fehler beim Lesen der Datei!", "error"); }
            };
            reader.readAsText(file); event.target.value = "";
        }
        function downloadJSON(data, filename) { const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2)); a.download = filename; a.click(); }

        // --- EDITORIAL PDF GENERATOR (Neu: Gepäck links, Liste rechts) ---
        function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.setFontSize(24); doc.setFont("helvetica", "bold"); doc.setTextColor(20, 25, 30); doc.text("Pack-Zeugnis", 15, 20);
            
            let currentY = 35;

            if(luggages.length === 0) { doc.setFontSize(12); doc.setFont("helvetica", "normal"); doc.text("Keine Gepäckstücke vorhanden.", 15, currentY); doc.save("Packliste.pdf"); return; }

            luggages.forEach((lug, index) => {
                // Page Break Check: Wenn nicht genug Platz für eine Box (ca. 80px), dann neue Seite
                if(currentY > 220) { doc.addPage(); currentY = 20; }

                // --- 1. LINKE SPALTE: VISUELLES GEPÄCK ---
                const startX = 15;
                const rgbColor = hexToRgbArray(lug.color || '#cccccc');
                
                // Zeichne Koffer Vektorgrafik (Maßstabsgetreu verkleinert)
                const visW = Math.max(lug.w * 0.8, 25);
                const visH = Math.max(lug.h * 0.8, 35);
                
                doc.setDrawColor(50, 50, 50);
                doc.setLineWidth(0.5);
                
                // Leichte Aufhellung der Farbe für das "Glas" im PDF
                doc.setFillColor(rgbColor[0], rgbColor[1], rgbColor[2]);

                if(lug.type === 'trolley') {
                    doc.roundedRect(startX+5, currentY+5, visW, visH, 3, 3, 'FD'); // Body
                    doc.rect(startX+(visW/2), currentY, 12, 5, 'S'); // Handle
                    doc.setFillColor(0,0,0);
                    doc.rect(startX+10, currentY+5+visH, 6, 3, 'F'); // Rad L
                    doc.rect(startX+visW-6, currentY+5+visH, 6, 3, 'F'); // Rad R
                } else if(lug.type === 'koffer') {
                    doc.roundedRect(startX, currentY+5, visW, visH, 2, 2, 'FD'); // Body
                    doc.rect(startX+visW, currentY+15, 3, 15, 'S'); // Side Handle
                    doc.setFillColor(0,0,0); doc.globalAlpha = 0.5;
                    doc.rect(startX+(visW*0.3), currentY+5, 4, visH, 'F'); // Gurt
                    doc.globalAlpha = 1.0;
                } else { // Rucksack
                    doc.roundedRect(startX, currentY+5, visW, visH, 8, 8, 'FD'); // Body
                    doc.rect(startX+(visW/2)-5, currentY+1, 10, 4, 'S'); // Top Handle
                    doc.setFillColor(255,255,255); doc.globalAlpha = 0.2;
                    doc.roundedRect(startX+(visW*0.15), currentY+15, visW*0.7, visH*0.5, 3, 3, 'F'); // Tasche
                    doc.globalAlpha = 1.0;
                }

                // Text unterm Gepäckstück
                doc.setFont("helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(20, 25, 30);
                doc.text(lug.name, startX, currentY + visH + 15, {maxWidth: 50});
                
                doc.setFont("helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(100, 100, 100);
                doc.text(`Typ: ${lug.type.toUpperCase()}`, startX, currentY + visH + 20);
                doc.text(`Maße: ${lug.w}x${lug.h} cm`, startX, currentY + visH + 25);
                doc.text(`Max: ${lug.weight} kg`, startX, currentY + visH + 30);
                if(lug.deadline) { doc.text(`Frist: ${new Date(lug.deadline).toLocaleDateString('de-DE')}`, startX, currentY + visH + 35); }

                // --- 2. RECHTE SPALTE: CHECKLISTE ---
                const tableData = [...lug.items].sort((a,b) => a.cat.localeCompare(b.cat)).map(i => [i.packed ? "[ X ]" : "[   ]", i.cat, i.name]);
                if(tableData.length === 0) tableData.push(["-", "-", "Koffer ist leer."]);

                doc.autoTable({
                    startY: currentY,
                    margin: { left: startX + 60 }, // Drückt die Tabelle nach rechts neben den Koffer
                    head: [['St.', 'Kategorie', 'Gegenstand']],
                    body: tableData,
                    theme: 'grid',
                    headStyles: { fillColor: [rgbColor[0], rgbColor[1], rgbColor[2]], textColor: (rgbColor[0]*0.299 + rgbColor[1]*0.587 + rgbColor[2]*0.114) > 186 ? [0,0,0] : [255,255,255] },
                    styles: { font: 'helvetica', fontSize: 10 },
                    columnStyles: { 0: { cellWidth: 15, halign: 'center' }, 1: { cellWidth: 35 } }
                });

                // Den tiefsten Punkt berechnen (entweder die Tabelle war sehr lang, oder die Koffer-Grafik)
                const bottomOfLuggage = currentY + visH + 45;
                const bottomOfTable = doc.lastAutoTable.finalY + 15;
                
                currentY = Math.max(bottomOfLuggage, bottomOfTable);
            });

            doc.save("Gepaeck_Editorial.pdf");
            showToast("Editorial PDF generiert!", "success");
        }
    </script>
</body>
