<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-End Travel Packer - Packhalle</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg-dark: #161b22;
            --bg-panel: #212836;
            --bg-input: #12161d;
            --accent-gold: #ffc107;
            --accent-gold-hover: #e0a800;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --success-green: #2ea043;
            --danger-red: #da3633;
            
            /* Etwas kleinerer Maßstab für die Halle, damit sie schön nebeneinander passen */
            --cm-to-px: 4px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark); color: var(--text-main); padding: 20px;
            background-image: radial-gradient(circle at 50% 0%, rgba(26, 60, 80, 0.3) 0%, transparent 50%);
            min-height: 100vh; overflow-x: hidden;
        }

        /* Top Navigation */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; border-bottom: 2px solid var(--accent-gold); margin-bottom: 20px;
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--accent-gold); display: flex; align-items: center; gap: 10px; }
        .btn-group { display: flex; gap: 10px; }

        button {
            background-color: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border-color);
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600;
            transition: all 0.2s; display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
        }
        button:hover { background-color: var(--border-color); }
        button.primary { background-color: var(--accent-gold); color: #000; border: none; }
        button.primary:hover { background-color: var(--accent-gold-hover); }
        button.icon-btn { padding: 6px 10px; }

        /* Layout Grid */
        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; align-items: start; }
        @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } }

        /* Panels */
        .panel {
            background-color: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .panel-title {
            font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;
            color: var(--text-main); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; justify-content: space-between;
        }

        /* Form Elements */
        .form-group { margin-bottom: 15px; }
        .row-group { display: flex; gap: 10px; }
        .row-group .form-group { flex: 1; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-color);
            color: var(--text-main); padding: 9px; border-radius: 4px; font-size: 0.9rem;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent-gold); }
        .hidden { display: none; }

        /* --- DASHBOARD TOOLS --- */
        .progress-bar-container { background: var(--bg-input); border-radius: 6px; height: 12px; width: 100%; overflow: hidden; margin-top: 8px; border: 1px solid var(--border-color);}
        .progress-bar-fill { background: var(--success-green); height: 100%; width: 0%; transition: width 0.4s ease; }
        
        .weather-tool { display: flex; gap: 5px; margin-top: 5px; }
        .weather-tool input { flex-grow: 1; }

        /* --- THE HALL (Geschlossene Gepäckstücke) --- */
        .luggage-area { display: flex; flex-wrap: wrap; gap: 40px; justify-content: flex-start; align-items: flex-end; padding-bottom: 50px;}
        
        .luggage-wrapper {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            transition: transform 0.2s, filter 0.2s; position: relative;
        }
        .luggage-wrapper:hover { transform: translateY(-5px); filter: drop-shadow(0 10px 15px rgba(255,193,7,0.15)); }

        .luggage-info-tag {
            background: rgba(0,0,0,0.8); border: 1px solid var(--border-color); border-bottom: 2px solid var(--accent-gold);
            border-radius: 6px; padding: 8px 12px; margin-bottom: 15px; text-align: center; z-index: 10;
        }
        .luggage-info-tag h3 { color: var(--text-main); font-size: 0.95rem; margin-bottom: 4px; }
        .luggage-info-tag span { color: var(--text-muted); font-size: 0.75rem; }

        /* Visuelle Koffer (Geschlossen) */
        .luggage-body {
            position: relative;
            background: linear-gradient(135deg, #2c3340 0%, #1a1f29 100%);
            border: 2px solid #4a5468;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.1);
        }

        /* Mini Progress Bar outside */
        .mini-progress {
            position: absolute; bottom: 10px; left: 10%; width: 80%; height: 6px;
            background: rgba(0,0,0,0.5); border-radius: 3px; overflow: hidden;
        }
        .mini-progress-fill { background: var(--accent-gold); height: 100%; width: 0%; }

        /* 1. Trolley (Geschlossen) */
        .luggage-type-trolley .luggage-body { border-radius: 12px; }
        .luggage-type-trolley .luggage-body::before { /* Teleskopgriff */
            content: ''; position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 30%; height: 15px; border: 4px solid #7a8498; border-bottom: none; border-radius: 5px 5px 0 0; z-index: -1;
        }
        .luggage-type-trolley .luggage-body::after { /* Rollen */
            content: ''; position: absolute; bottom: -8px; left: 15%; width: 70%; height: 8px;
            border-left: 12px solid #111; border-right: 12px solid #111; z-index: -1;
        }
        /* Trolley Stripes */
        .trolley-stripes {
            position: absolute; top: 10%; left: 20%; width: 60%; height: 80%;
            background: repeating-linear-gradient(to bottom, transparent, transparent 15px, rgba(0,0,0,0.1) 15px, rgba(0,0,0,0.1) 20px);
        }

        /* 2. Koffer (Geschlossen) */
        .luggage-type-koffer .luggage-body { border-radius: 8px; background: linear-gradient(135deg, #3c4454 0%, #242a35 100%); }
        .luggage-type-koffer .luggage-body::before { /* Seitengriff */
            content: ''; position: absolute; top: 50%; right: -12px; transform: translateY(-50%);
            width: 10px; height: 40px; border: 4px solid #7a8498; border-left: none; border-radius: 0 5px 5px 0; z-index: -1;
        }
        .koffer-strap {
            position: absolute; top: 0; left: 30%; width: 10%; height: 100%; background: #111; opacity: 0.6;
        }
        .koffer-strap-2 { left: 60%; }

        /* 3. Rucksack (Geschlossen) */
        .luggage-type-rucksack .luggage-body { 
            border-radius: 35% 35% 15% 15% / 20% 20% 10% 10%; 
            background: linear-gradient(135deg, #354a3a 0%, #1e2b21 100%); border-color: #4a6350;
        }
        .luggage-type-rucksack .luggage-body::before { /* Riemen */
            content: ''; position: absolute; top: 10%; left: -10px; width: calc(100% + 20px); height: 80%;
            border-left: 8px solid #1a241c; border-right: 8px solid #1a241c; border-radius: 15px; z-index: -1;
        }
        .rucksack-pocket {
            position: absolute; bottom: 20%; left: 20%; width: 60%; height: 35%;
            background: rgba(0,0,0,0.2); border: 2px solid rgba(255,255,255,0.05); border-radius: 10px;
        }

        /* --- MODAL (Gepäckstück offen bearbeiten) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--bg-dark); border: 1px solid var(--accent-gold);
            width: 90%; max-width: 800px; max-height: 90vh; border-radius: 12px;
            display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden; transform: scale(0.95); transition: transform 0.3s;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }

        .modal-header {
            padding: 20px 25px; border-bottom: 1px solid var(--border-color); background: var(--bg-panel);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h2 { color: var(--accent-gold); display: flex; align-items: center; gap: 10px;}
        .close-modal { background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }
        .close-modal:hover { color: white; }

        .modal-body { padding: 25px; overflow-y: auto; flex-grow: 1; }
        
        .modal-stats { display: flex; gap: 20px; margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px;}
        .stat-box { flex: 1; text-align: center; }
        .stat-box span { display: block; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 5px;}
        .stat-box strong { font-size: 1.1rem; }

        /* Categorized List inside Modal */
        .cat-section { margin-bottom: 20px; }
        .cat-title { font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; margin-bottom: 10px; }
        
        .list-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 15px; background: var(--bg-input); margin-bottom: 8px; border-radius: 6px;
            border-left: 3px solid var(--accent-gold); transition: 0.2s;
        }
        .list-item:hover { background: #1a202a; }
        .list-item.packed { opacity: 0.6; border-left-color: var(--success-green); }
        .list-item.packed .item-name { text-decoration: line-through; }
        
        .item-left { display: flex; align-items: center; gap: 15px; }
        .item-left input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--success-green); cursor: pointer;}
        .item-name { font-size: 1rem; font-weight: 600;}
        
        .item-delete { color: var(--danger-red); background: none; border: none; cursor: pointer; padding: 5px; font-size: 1.1rem;}
        .item-delete:hover { transform: scale(1.1); }

        /* Add Item Area in Modal */
        .modal-footer {
            padding: 20px 25px; border-top: 1px solid var(--border-color); background: var(--bg-panel);
            display: flex; gap: 10px;
        }
        .modal-footer input { flex: 2; }
        .modal-footer select { flex: 1; }

    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-plane-departure"></i> Travel-Packer Pro</div>
        <div class="btn-group">
            <button onclick="document.getElementById('importData').click()"><i class="fa-solid fa-file-import"></i> Reisedaten Import</button>
            <input type="file" id="importData" class="hidden" accept=".json" onchange="importData(event)">
            <button onclick="exportData()"><i class="fa-solid fa-file-export"></i> Reisedaten Export</button>
            <button class="primary" onclick="generatePDF()"><i class="fa-solid fa-file-pdf"></i> PDF-Checkliste</button>
        </div>
    </header>

    <div class="layout">
        <!-- LEFT COLUMN: Settings & Tools -->
        <div class="left-column">
            
            <!-- Dashboard / Tools Panel -->
            <div class="panel">
                <div class="panel-title"><i class="fa-solid fa-gauge-high"></i> Travel Tools</div>
                
                <!-- Tool 1: Global Progress -->
                <div class="form-group">
                    <label>Gesamter Pack-Fortschritt</label>
                    <div style="font-weight: bold; font-size: 1.2rem; margin-bottom: 5px;" id="globalProgressText">0 / 0 gepackt</div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="globalProgressBar"></div>
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">

                <!-- Tool 2: Weather Quick Check -->
                <div class="form-group">
                    <label>Reise-Wetter prüfen</label>
                    <div class="weather-tool">
                        <input type="text" id="weatherCity" placeholder="z.B. Barcelona">
                        <button class="primary icon-btn" onclick="checkWeather()"><i class="fa-solid fa-cloud-sun"></i></button>
                    </div>
                </div>
            </div>

            <!-- Management Data (Categories) -->
            <div class="panel">
                <div class="panel-title">
                    <span><i class="fa-solid fa-tags"></i> Kategorien</span>
                </div>
                <div class="row-group">
                    <input type="text" id="newCategory" placeholder="Neue Kategorie...">
                    <button class="primary icon-btn" onclick="addCategory()"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="form-group" style="margin-top: 10px;">
                    <select id="categoryList" size="3" style="height: 70px;">
                        <!-- JS filled -->
                    </select>
                </div>
            </div>

            <!-- Luggage Generator -->
            <div class="panel">
                <div class="panel-title"><i class="fa-solid fa-box-open"></i> Neues Gepäck erstellen</div>
                
                <div class="form-group">
                    <label>Typ</label>
                    <select id="luggageType">
                        <option value="koffer">Koffer (Hartschale)</option>
                        <option value="trolley">Trolley (Handgepäck)</option>
                        <option value="rucksack">Rucksack</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="luggageName" placeholder="z.B. Koffer Strandurlaub...">
                </div>

                <div class="row-group">
                    <div class="form-group">
                        <label>Breite (cm)</label><input type="number" id="luggageW" value="40" min="10" max="100">
                    </div>
                    <div class="form-group">
                        <label>Höhe (cm)</label><input type="number" id="luggageH" value="55" min="10" max="120">
                    </div>
                </div>

                <div class="row-group">
                    <div class="form-group">
                        <label>Max kg</label><input type="number" id="luggageWeight" value="8" min="1" step="0.5">
                    </div>
                    <div class="form-group">
                        <label>Frist</label><input type="date" id="luggageDeadline">
                    </div>
                </div>

                <button class="primary" style="width: 100%; justify-content: center; margin-top: 10px;" onclick="addLuggage()">
                    <i class="fa-solid fa-plus"></i> In die Halle stellen
                </button>
            </div>
        </div>

        <!-- RIGHT COLUMN: The Hall (Closed Luggage) -->
        <div class="right-column">
            <h2 style="margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                <i class="fa-solid fa-warehouse"></i> Meine Packhalle
            </h2>
            <div class="luggage-area" id="hallArea">
                <!-- Rendered by JS -->
            </div>
        </div>
    </div>

    <!-- THE MODAL (Open Luggage Editor) -->
    <div class="modal-overlay" id="luggageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"><i class="fa-solid fa-suitcase"></i> Koffer Name</h2>
                <div style="display: flex; gap: 15px;">
                    <button class="icon-btn" style="border-color: var(--danger-red); color: var(--danger-red);" onclick="deleteCurrentLuggage()" title="Koffer komplett löschen"><i class="fa-solid fa-trash-can"></i></button>
                    <button class="close-modal" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            
            <div class="modal-body">
                <div class="modal-stats">
                    <div class="stat-box"><span>Maße</span><strong id="modalDim">40x55 cm</strong></div>
                    <div class="stat-box"><span>Max Gewicht</span><strong id="modalWeight">8 kg</strong></div>
                    <div class="stat-box"><span>Frist</span><strong id="modalDeadline">-</strong></div>
                    <div class="stat-box"><span>Fortschritt</span><strong id="modalProgress" style="color: var(--success-green);">0 / 0</strong></div>
                </div>

                <!-- Items will be injected here, grouped by category -->
                <div id="modalItemsList"></div>
            </div>

            <div class="modal-footer">
                <input type="text" id="modalNewItem" placeholder="Was willst du einpacken?" onkeypress="if(event.key === 'Enter') addItemToCurrentLuggage()">
                <select id="modalCatSelect"></select>
                <button class="primary icon-btn" onclick="addItemToCurrentLuggage()"><i class="fa-solid fa-plus"></i> Hinzufügen</button>
            </div>
        </div>
    </div>

    <script>
        // --- STATE ---
        let categories = ["Kleidung", "Hygiene", "Elektronik", "Dokumente"];
        let luggages = [];
        let currentOpenLuggageId = null;

        // --- INIT ---
        window.onload = () => {
            updateCategoryList();
            updateDashboard();
            renderHall();
        };

        // --- DASHBOARD TOOLS ---
        function checkWeather() {
            const city = document.getElementById('weatherCity').value.trim();
            if(city) {
                // Öffnet eine einfache und schöne Wetter-Seite im neuen Tab
                window.open(`https://wttr.in/${encodeURIComponent(city)}`, '_blank');
            } else {
                alert("Bitte gib eine Stadt ein.");
            }
        }

        function updateDashboard() {
            let totalItems = 0;
            let packedItems = 0;
            luggages.forEach(l => {
                totalItems += l.items.length;
                packedItems += l.items.filter(i => i.packed).length;
            });

            const percent = totalItems === 0 ? 0 : Math.round((packedItems / totalItems) * 100);
            
            document.getElementById('globalProgressText').innerText = `${packedItems} / ${totalItems} gepackt (${percent}%)`;
            document.getElementById('globalProgressBar').style.width = `${percent}%`;
        }

        // --- CATEGORIES ---
        function updateCategoryList() {
            const list = document.getElementById('categoryList');
            const select = document.getElementById('modalCatSelect');
            list.innerHTML = ''; select.innerHTML = '';
            
            categories.forEach(cat => {
                list.innerHTML += `<option value="${cat}">${cat}</option>`;
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        }
        function addCategory() {
            const val = document.getElementById('newCategory').value.trim();
            if (val && !categories.includes(val)) {
                categories.push(val); document.getElementById('newCategory').value = ''; updateCategoryList();
            }
        }

        // --- LUGGAGE MANAGEMENT ---
        function addLuggage() {
            const name = document.getElementById('luggageName').value.trim() || "Unbenannt";
            const type = document.getElementById('luggageType').value;
            const w = parseInt(document.getElementById('luggageW').value) || 40;
            const h = parseInt(document.getElementById('luggageH').value) || 55;
            const weight = document.getElementById('luggageWeight').value || 8;
            const deadline = document.getElementById('luggageDeadline').value;

            luggages.push({ id: Date.now().toString(), type, name, w, h, weight, deadline, items: [] });
            document.getElementById('luggageName').value = '';
            renderHall();
            updateDashboard();
        }

        function deleteCurrentLuggage() {
            if(confirm("Gepäckstück und alle Items darin wirklich löschen?")) {
                luggages = luggages.filter(l => l.id !== currentOpenLuggageId);
                closeModal();
                renderHall();
                updateDashboard();
            }
        }

        // --- RENDER HALL (Closed Luggage) ---
        function renderHall() {
            const area = document.getElementById('hallArea');
            area.innerHTML = '';

            if (luggages.length === 0) {
                area.innerHTML = `
                    <div style="text-align: center; width: 100%; margin-top: 50px; color: var(--text-muted);">
                        <i class="fa-solid fa-boxes-packing" style="font-size: 4rem; opacity: 0.3; margin-bottom: 15px;"></i>
                        <p>Deine Halle ist leer. Erstelle links ein Gepäckstück.</p>
                    </div>`;
                return;
            }

            luggages.forEach(l => {
                const scale = 4; // 1cm = 4px in the hall
                const calcWidth = Math.max(l.w * scale, 100); 
                const calcHeight = Math.max(l.h * scale, 120);

                let icon = 'fa-suitcase-rolling';
                if(l.type === 'koffer') icon = 'fa-suitcase';
                if(l.type === 'rucksack') icon = 'fa-backpack';

                // Progress calculation
                const tItems = l.items.length;
                const pItems = l.items.filter(i => i.packed).length;
                const percent = tItems === 0 ? 0 : (pItems / tItems) * 100;

                // Visual Details based on type
                let detailsHtml = '';
                if(l.type === 'trolley') detailsHtml = '<div class="trolley-stripes"></div>';
                if(l.type === 'koffer') detailsHtml = '<div class="koffer-strap"></div><div class="koffer-strap-2"></div>';
                if(l.type === 'rucksack') detailsHtml = '<div class="rucksack-pocket"></div>';

                const html = `
                    <div class="luggage-wrapper luggage-type-${l.type}" onclick="openModal('${l.id}')">
                        <div class="luggage-info-tag">
                            <h3><i class="fa-solid ${icon}"></i> ${l.name}</h3>
                            <span>${pItems}/${tItems} gepackt</span>
                        </div>
                        <div class="luggage-body" style="width: ${calcWidth}px; height: ${calcHeight}px;">
                            ${detailsHtml}
                            <div class="mini-progress"><div class="mini-progress-fill" style="width: ${percent}%"></div></div>
                        </div>
                    </div>
                `;
                area.innerHTML += html;
            });
        }

        // --- MODAL LOGIC (Opened Luggage) ---
        function openModal(id) {
            currentOpenLuggageId = id;
            renderModalContent();
            document.getElementById('luggageModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('luggageModal').classList.remove('active');
            currentOpenLuggageId = null;
        }

        function renderModalContent() {
            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            if(!lug) return;

            // Update Header & Stats
            let icon = lug.type === 'rucksack' ? 'fa-backpack' : (lug.type === 'koffer' ? 'fa-suitcase' : 'fa-suitcase-rolling');
            document.getElementById('modalTitle').innerHTML = `<i class="fa-solid ${icon}"></i> ${lug.name}`;
            document.getElementById('modalDim').innerText = `${lug.w}x${lug.h} cm`;
            document.getElementById('modalWeight').innerText = `${lug.weight} kg`;
            document.getElementById('modalDeadline').innerText = lug.deadline ? new Date(lug.deadline).toLocaleDateString('de-DE') : '-';
            
            const p = lug.items.filter(i => i.packed).length;
            document.getElementById('modalProgress').innerText = `${p} / ${lug.items.length}`;

            // Render Items Grouped by Category
            const listContainer = document.getElementById('modalItemsList');
            listContainer.innerHTML = '';

            if(lug.items.length === 0) {
                listContainer.innerHTML = `<p style="text-align:center; color:var(--text-muted); margin: 30px 0;">Koffer ist noch leer.</p>`;
                return;
            }

            // Grouping logic
            categories.forEach(cat => {
                const catItems = lug.items.filter(i => i.cat === cat);
                if(catItems.length === 0) return;

                let html = `<div class="cat-section">
                                <div class="cat-title">${cat}</div>`;
                
                catItems.forEach(item => {
                    html += `
                        <div class="list-item ${item.packed ? 'packed' : ''}">
                            <div class="item-left">
                                <input type="checkbox" ${item.packed ? 'checked' : ''} onchange="toggleItem('${item.id}')">
                                <span class="item-name">${item.name}</span>
                            </div>
                            <button class="item-delete" onclick="deleteItem('${item.id}')"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    `;
                });
                html += `</div>`;
                listContainer.innerHTML += html;
            });
        }

        // --- ITEMS IN MODAL ---
        function addItemToCurrentLuggage() {
            const nameInput = document.getElementById('modalNewItem');
            const cat = document.getElementById('modalCatSelect').value;
            const name = nameInput.value.trim();
            
            if(!name || !currentOpenLuggageId) return;

            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            lug.items.push({
                id: Date.now().toString() + Math.random().toString(16).substr(2,4),
                name: name, cat: cat, packed: false
            });

            nameInput.value = '';
            nameInput.focus();
            
            renderModalContent();
            renderHall(); // Update mini progress
            updateDashboard();
        }

        function toggleItem(itemId) {
            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            const item = lug.items.find(i => i.id === itemId);
            if(item) item.packed = !item.packed;
            
            renderModalContent();
            renderHall();
            updateDashboard();
        }

        function deleteItem(itemId) {
            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            lug.items = lug.items.filter(i => i.id !== itemId);
            
            renderModalContent();
            renderHall();
            updateDashboard();
        }

        // --- IMPORT / EXPORT (NAHTLOS KOMPATIBEL) ---
        function exportData() {
            downloadJSON({ categories, luggages }, 'reisedaten_koffer.json');
        }

        function importData(event) {
            readJSON(event, (data) => {
                // Kompatibilitäts-Check: Akzeptiert das alte Format perfekt!
                if (data && data.luggages) {
                    if(data.categories && Array.isArray(data.categories)) {
                        categories = data.categories;
                    }
                    luggages = data.luggages;
                    
                    updateCategoryList();
                    renderHall();
                    updateDashboard();
                    alert("Reisedaten nahtlos und erfolgreich importiert!");
                } else {
                    alert("Diese Datei hat nicht das richtige Format.");
                }
            });
        }

        function downloadJSON(data, filename) {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
            const a = document.createElement('a');
            a.href = dataStr; a.download = filename; a.click();
        }

        function readJSON(event, callback) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try { callback(JSON.parse(e.target.result)); } 
                catch (err) { alert("Fehler beim Lesen der Datei!"); }
            };
            reader.readAsText(file);
            event.target.value = "";
        }

        // --- PDF GENERATION ---
        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const colorGold = [255, 193, 7]; 
            const colorDark = [22, 27, 34];  
            
            doc.setFontSize(22);
            doc.setTextColor(colorDark[0], colorDark[1], colorDark[2]);
            doc.text("Travel-Packer Checkliste", 14, 20);
            
            let startY = 30;

            if(luggages.length === 0) {
                doc.setFontSize(12); doc.text("Halle ist leer.", 14, startY); doc.save("Packliste.pdf"); return;
            }

            luggages.forEach((lug) => {
                if(startY > 250) { doc.addPage(); startY = 20; }

                doc.setFontSize(14); doc.setTextColor(colorDark[0], colorDark[1], colorDark[2]);
                let deadlineStr = lug.deadline ? ` | Frist: ${new Date(lug.deadline).toLocaleDateString('de-DE')}` : '';
                doc.text(`Gepaeck: ${lug.name} (${lug.type.toUpperCase()})`, 14, startY);
                
                doc.setFontSize(10); doc.setTextColor(100);
                doc.text(`Masse: ${lug.w}x${lug.h} cm | Max. ${lug.weight} kg${deadlineStr}`, 14, startY + 6);
                
                startY += 12;

                // Tabellendaten aufbereiten (Gruppiert nach Kategorien durch Sortierung)
                const sortedItems = [...lug.items].sort((a,b) => a.cat.localeCompare(b.cat));
                const tableData = sortedItems.map(item => [item.packed ? "[ X ]" : "[   ]", item.cat, item.name]);

                if(tableData.length === 0) { tableData.push(["-", "-", "Koffer ist leer."]); }

                doc.autoTable({
                    startY: startY,
                    head: [['Status', 'Kategorie', 'Gegenstand']],
                    body: tableData,
                    theme: 'grid',
                    headStyles: { fillColor: colorGold, textColor: [0,0,0] },
                    styles: { font: 'helvetica', fontSize: 10 },
                    columnStyles: { 0: { cellWidth: 20, halign: 'center' }, 1: { cellWidth: 40 }, 2: { cellWidth: 'auto' } }
                });

                startY = doc.lastAutoTable.finalY + 15;
            });

            doc.save("Gepaeck_Checkliste.pdf");
        }
    </script>
</body>
