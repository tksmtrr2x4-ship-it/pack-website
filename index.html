<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-End Travel Packer - iOS Glass Edition</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f1115;
            --accent-gold: #ffc107;
            --accent-gold-hover: #e0a800;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --success-green: #2ea043;
            --danger-red: #da3633;
            
            /* iOS Glass Variables */
            --glass-bg: rgba(25, 30, 40, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --glass-blur: blur(20px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* Ambient Background Blobs for Glassmorphism */
        .ambient-blob { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.5; animation: float 20s infinite alternate; }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(255, 193, 7, 0.15); animation-delay: 0s; }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: rgba(46, 160, 67, 0.1); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 60%; width: 40vw; height: 40vw; background: rgba(56, 110, 200, 0.1); animation-delay: -10s; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(5%, 10%) scale(1.1); } }

        /* Universal Glass Class */
        .glass-panel {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: var(--glass-shadow); padding: 25px;
        }

        .app-container { max-width: 1400px; margin: 0 auto; padding: 20px 20px 100px 20px; }

        /* --- HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; margin-bottom: 30px; position: sticky; top: 20px; z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--accent-gold); display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 10px; }

        button {
            background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--glass-border);
            padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 600;
            transition: all 0.2s; display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        button:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        button.primary { background: linear-gradient(135deg, var(--accent-gold), #d4a000); color: #000; border: none; box-shadow: 0 4px 15px rgba(255,193,7,0.3);}
        button.primary:hover { box-shadow: 0 6px 20px rgba(255,193,7,0.4); }
        button.icon-btn { padding: 10px; justify-content: center; }

        .hidden { display: none; }

        /* --- LAYOUT GRID --- */
        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; align-items: start; }

        /* Form Elements */
        .form-group { margin-bottom: 15px; }
        .row-group { display: flex; gap: 12px; }
        .row-group .form-group { flex: 1; }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;}
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            color: var(--text-main); padding: 12px 15px; border-radius: 10px; font-size: 0.95rem; transition: 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent-gold); background: rgba(0,0,0,0.5); }

        /* --- WEATHER VORSCHAUHALLE (New!) --- */
        .weather-dashboard { margin-bottom: 30px; overflow: hidden; position: relative;}
        .weather-search { display: flex; gap: 10px; margin-bottom: 20px; }
        .forecast-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin-top: 15px; }
        .forecast-day {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 15px 10px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.2s;
        }
        .forecast-day:hover { background: rgba(255,193,7,0.05); border-color: rgba(255,193,7,0.3); transform: translateY(-3px);}
        .forecast-day .day-name { font-size: 0.8rem; color: var(--text-muted); font-weight: 600;}
        .forecast-day i { font-size: 1.8rem; color: var(--accent-gold); margin: 5px 0;}
        .forecast-day .temps { font-size: 0.9rem; font-weight: 700; }
        .forecast-day .rain { font-size: 0.75rem; color: #4aa5ff; display: flex; align-items: center; gap: 4px;}

        /* Smart Packing Assistant */
        .smart-suggestions { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--glass-border); display: none;}
        .suggestion-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .s-tag {
            background: rgba(46, 160, 67, 0.15); border: 1px solid rgba(46, 160, 67, 0.3); color: var(--success-green);
            padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .s-tag:hover { background: rgba(46, 160, 67, 0.3); }

        /* --- THE HALL (Closed Luggage) --- */
        .section-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .luggage-area { display: flex; flex-wrap: wrap; gap: 35px; }
        
        .luggage-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; position: relative; }
        .luggage-wrapper:hover { transform: translateY(-8px) scale(1.02); filter: drop-shadow(0 15px 25px rgba(255,193,7,0.2)); }

        .luggage-info-tag {
            background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); border-bottom: 2px solid var(--accent-gold);
            border-radius: 12px; padding: 10px 15px; margin-bottom: 20px; text-align: center; backdrop-filter: blur(10px);
        }
        .luggage-info-tag h3 { font-size: 1rem; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; justify-content: center;}

        /* Visual Luggage Models (Glass Themed) */
        .luggage-body { position: relative; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)); border: 1px solid rgba(255,255,255,0.2); box-shadow: inset 0 2px 10px rgba(255,255,255,0.1), 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .mini-progress { position: absolute; bottom: 15px; left: 10%; width: 80%; height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px; overflow: hidden; }
        .mini-progress-fill { background: var(--accent-gold); height: 100%; transition: 0.4s;}

        .luggage-type-trolley .luggage-body { border-radius: 15px; }
        .luggage-type-trolley .luggage-body::before { content: ''; position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 35%; height: 18px; border: 4px solid rgba(255,255,255,0.3); border-bottom: none; border-radius: 6px 6px 0 0; }
        .luggage-type-trolley .luggage-body::after { content: ''; position: absolute; bottom: -10px; left: 15%; width: 70%; height: 10px; border-left: 14px solid #111; border-right: 14px solid #111; }

        .luggage-type-koffer .luggage-body { border-radius: 10px; }
        .luggage-type-koffer .luggage-body::before { content: ''; position: absolute; top: 50%; right: -15px; transform: translateY(-50%); width: 15px; height: 50px; border: 4px solid rgba(255,255,255,0.3); border-left: none; border-radius: 0 6px 6px 0; }
        .koffer-strap { position: absolute; top: 0; left: 30%; width: 12%; height: 100%; background: rgba(0,0,0,0.6); }
        .koffer-strap-2 { left: 60%; }

        .luggage-type-rucksack .luggage-body { border-radius: 35% 35% 15% 15% / 20% 20% 10% 10%; }
        .luggage-type-rucksack .luggage-body::before { content: ''; position: absolute; top: 10%; left: -12px; width: calc(100% + 24px); height: 80%; border-left: 8px solid rgba(255,255,255,0.1); border-right: 8px solid rgba(255,255,255,0.1); border-radius: 15px; z-index: -1; }

        /* --- THE MODAL (Glass) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: rgba(20, 25, 35, 0.6); border: 1px solid var(--glass-border);
            width: 95%; max-width: 800px; max-height: 90vh; border-radius: 24px; display: flex; flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); transform: scale(0.95); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }

        .modal-header { padding: 25px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2);}
        .close-modal { background: none; border: none; font-size: 1.8rem; color: var(--text-muted); cursor: pointer; }
        .close-modal:hover { color: white; }

        .modal-body { padding: 25px; overflow-y: auto; flex-grow: 1; }
        .modal-stats { display: flex; gap: 15px; margin-bottom: 30px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border);}
        .stat-box { flex: 1; text-align: center; border-right: 1px solid var(--glass-border); }
        .stat-box:last-child { border-right: none; }
        .stat-box span { display: block; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px;}
        .stat-box strong { font-size: 1.2rem; }

        .list-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; background: rgba(0,0,0,0.4); margin-bottom: 10px; border-radius: 12px;
            border-left: 4px solid var(--accent-gold); transition: 0.2s; border-top: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border);
        }
        .list-item.packed { opacity: 0.5; border-left-color: var(--success-green); background: rgba(46, 160, 67, 0.1);}
        .list-item.packed .item-name { text-decoration: line-through; }
        .item-left { display: flex; align-items: center; gap: 15px; }
        .item-left input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--success-green); cursor: pointer;}
        
        .modal-footer { padding: 20px 25px; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.4); display: flex; gap: 10px; }

        /* --- TRUE MOBILE RESPONSIVENESS (Media Queries) --- */
        @media (max-width: 900px) {
            .app-container { padding: 10px 10px 80px 10px; }
            header { flex-direction: column; gap: 15px; padding: 15px; border-radius: 20px; position: relative; top: 0; margin-bottom: 20px;}
            .header-actions { flex-wrap: wrap; justify-content: center; width: 100%;}
            .header-actions button { flex: 1; min-width: 100px; justify-content: center;}
            
            .layout { grid-template-columns: 1fr; gap: 20px; }
            
            .row-group { flex-direction: column; gap: 0;}
            
            .luggage-area { justify-content: center; }
            
            .weather-search { flex-direction: column; }
            
            .modal-stats { flex-wrap: wrap; }
            .stat-box { min-width: 40%; border-right: none; margin-bottom: 10px;}
            
            .modal-footer { flex-direction: column; }
            .modal-footer button { padding: 15px; }
        }
    </style>
</head>
<body>

    <!-- Ambient Blobs -->
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
    <div class="ambient-blob blob-3"></div>

    <div class="app-container">
        
        <!-- HEADER -->
        <header class="glass-panel" style="padding: 15px 25px;">
            <div class="logo"><i class="fa-solid fa-plane-departure"></i> Packer iOS</div>
            <div class="header-actions">
                <button onclick="document.getElementById('importData').click()"><i class="fa-solid fa-file-import"></i> Import</button>
                <input type="file" id="importData" class="hidden" accept=".json" onchange="importData(event)">
                <button onclick="exportData()"><i class="fa-solid fa-file-export"></i> Export</button>
                <button class="primary" onclick="generatePDF()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
            </div>
        </header>

        <main class="layout">
            
            <!-- LEFT COLUMN (Tools & Settings) -->
            <div class="left-column">
                
                <!-- Tool: Converter & Progress -->
                <div class="glass-panel" style="margin-bottom: 25px;">
                    <div class="section-title" style="font-size: 1.1rem; margin-bottom: 15px;"><i class="fa-solid fa-wallet"></i> Quick-Tools</div>
                    
                    <label>Währungsrechner (Live)</label>
                    <div class="row-group" style="margin-bottom: 20px; gap: 5px;">
                        <input type="number" id="currAmount" value="100" style="flex: 1;" oninput="calcCurrency()">
                        <select id="currFrom" style="flex: 1;" onchange="calcCurrency()"><option value="EUR">EUR</option><option value="USD">USD</option><option value="GBP">GBP</option><option value="CHF">CHF</option></select>
                        <div style="display:flex;align-items:center;padding:0 5px;">=</div>
                        <input type="text" id="currResult" readonly style="flex: 1.2; background: rgba(0,0,0,0.5); color: var(--accent-gold); font-weight: bold;">
                    </div>

                    <label>Gesamt-Fortschritt</label>
                    <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
                        <span>Gepackt</span><span id="globalProgressText" style="color: var(--accent-gold); font-weight: bold;">0%</span>
                    </div>
                    <div style="height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; border: 1px solid var(--glass-border);">
                        <div id="globalProgressBar" style="height: 100%; width: 0%; background: var(--success-green); transition: 0.4s;"></div>
                    </div>
                </div>

                <!-- Create Luggage -->
                <div class="glass-panel" style="margin-bottom: 25px;">
                    <div class="section-title" style="font-size: 1.1rem; margin-bottom: 15px;"><i class="fa-solid fa-box-open"></i> Neues Gepäck</div>
                    <div class="form-group"><label>Typ</label><select id="luggageType"><option value="koffer">Koffer</option><option value="trolley">Trolley</option><option value="rucksack">Rucksack</option></select></div>
                    <div class="form-group"><label>Name</label><input type="text" id="luggageName" placeholder="Z.B. Barcelona Trip"></div>
                    <div class="row-group">
                        <div class="form-group"><label>Breite (cm)</label><input type="number" id="luggageW" value="40"></div>
                        <div class="form-group"><label>Höhe (cm)</label><input type="number" id="luggageH" value="55"></div>
                    </div>
                    <div class="row-group">
                        <div class="form-group"><label>Max kg</label><input type="number" id="luggageWeight" value="8"></div>
                        <div class="form-group"><label>Frist</label><input type="date" id="luggageDeadline"></div>
                    </div>
                    <button class="primary" style="width: 100%; justify-content: center; padding: 14px; margin-top: 5px;" onclick="addLuggage()"><i class="fa-solid fa-plus"></i> Hinzufügen</button>
                </div>

                <!-- Categories -->
                <div class="glass-panel">
                    <div class="section-title" style="font-size: 1.1rem; margin-bottom: 15px;"><i class="fa-solid fa-tags"></i> Kategorien</div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="newCategory" placeholder="Neu...">
                        <button class="primary icon-btn" onclick="addCategory()"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <select id="categoryList" size="4" style="height: 100px; margin-top: 15px;"></select>
                </div>
            </div>

            <!-- RIGHT COLUMN (Weather & Hall) -->
            <div class="right-column">
                
                <!-- Wetter Vorschauhalle -->
                <div class="glass-panel weather-dashboard">
                    <div class="section-title"><i class="fa-solid fa-satellite-dish" style="color: var(--accent-gold);"></i> Wetter-Vorschauhalle</div>
                    <div class="weather-search">
                        <input type="text" id="weatherCity" placeholder="Reiseziel eingeben (z.B. Rom)..." onkeypress="if(event.key === 'Enter') fetchWeather()">
                        <button class="primary" onclick="fetchWeather()"><i class="fa-solid fa-magnifying-glass"></i> Abrufen</button>
                    </div>
                    
                    <div id="forecastContainer" style="display: none;">
                        <!-- Forecast Grid -->
                        <div class="forecast-grid" id="forecastGrid"></div>
                        
                        <!-- AI Smart Suggestions -->
                        <div class="smart-suggestions" id="smartSuggestions">
                            <label><i class="fa-solid fa-wand-magic-sparkles" style="color: var(--accent-gold);"></i> Smart AI Pack-Assistent</label>
                            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Basierend auf dem Wetter empfehlen wir:</p>
                            <div class="suggestion-tags" id="suggestionTags"></div>
                        </div>
                    </div>
                </div>

                <!-- Packhalle -->
                <div class="section-title" style="margin-top: 40px; margin-left: 10px;"><i class="fa-solid fa-warehouse"></i> Meine Packhalle</div>
                <div class="luggage-area" id="hallArea"></div>
            </div>
        </main>
    </div>

    <!-- THE MODAL (Glass) -->
    <div class="modal-overlay" id="luggageModal">
        <div class="modal-content glass-panel" style="padding: 0; background: rgba(20,25,35,0.75);">
            <div class="modal-header">
                <h2 id="modalTitle" style="color: var(--accent-gold); font-size: 1.5rem;"><i class="fa-solid fa-suitcase"></i></h2>
                <div style="display: flex; gap: 10px;">
                    <button class="icon-btn" style="border-color: var(--danger-red); color: var(--danger-red);" onclick="deleteCurrentLuggage()"><i class="fa-solid fa-trash-can"></i></button>
                    <button class="close-modal" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            
            <div class="modal-body">
                <div class="modal-stats">
                    <div class="stat-box"><span>Maße</span><strong id="modalDim">--</strong></div>
                    <div class="stat-box"><span>Gewicht</span><strong id="modalWeight">--</strong></div>
                    <div class="stat-box"><span>Frist</span><strong id="modalDeadline">--</strong></div>
                    <div class="stat-box"><span>Status</span><strong id="modalProgress" style="color: var(--success-green);">--</strong></div>
                </div>
                <div id="modalItemsList"></div>
            </div>

            <div class="modal-footer">
                <input type="text" id="modalNewItem" placeholder="Gegenstand..." onkeypress="if(event.key === 'Enter') addItemToCurrentLuggage()">
                <select id="modalCatSelect"></select>
                <button class="primary" onclick="addItemToCurrentLuggage()"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
    </div>

    <script>
        // --- STATE ---
        let categories = ["Kleidung", "Hygiene", "Elektronik", "Dokumente"];
        let luggages = [];
        let currentOpenLuggageId = null;
        let exchangeRates = {};

        // --- INIT ---
        window.onload = () => {
            updateCategoryList(); updateDashboard(); renderHall(); fetchExchangeRates();
        };

        // --- CURRENCY TOOL ---
        async function fetchExchangeRates() {
            try {
                const res = await fetch('https://api.exchangerate-api.com/v4/latest/EUR');
                const data = await res.json();
                exchangeRates = data.rates;
                calcCurrency();
            } catch(e) { console.log("Currency API failed"); }
        }
        function calcCurrency() {
            if(!exchangeRates.USD) return;
            const amount = parseFloat(document.getElementById('currAmount').value) || 0;
            const from = document.getElementById('currFrom').value;
            // Base is EUR. Convert to EUR first, then to target (simplified since we only select 'from' and output is to EUR/Target logic)
            // Wait, standard UI has 1 input, 1 select. Let's say: Input * Rate = EUR.
            // Actually, let's just convert FROM selected TO EUR (if selected is not EUR). If selected is EUR, convert to USD as default example.
            let result = 0;
            let targetSymbol = "€";
            if(from === "EUR") { result = amount * exchangeRates.USD; targetSymbol = "$"; }
            else { result = amount / exchangeRates[from]; }
            document.getElementById('currResult').value = result.toFixed(2) + " " + targetSymbol;
        }

        // --- WEATHER & AI TOOL ---
        async function fetchWeather() {
            const city = document.getElementById('weatherCity').value.trim();
            if(!city) return;
            
            const btn = document.querySelector('.weather-search button');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Lade...`;

            try {
                // 1. Geocoding
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=de`);
                const geoData = await geoRes.json();
                if(!geoData.results) { alert("Ort nicht gefunden!"); btn.innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> Abrufen`; return; }
                
                const lat = geoData.results[0].latitude; const lon = geoData.results[0].longitude;

                // 2. Fetch 7-Day Forecast
                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto`);
                const wData = await wRes.json();

                renderForecast(wData.daily);
                generateSmartSuggestions(wData.daily);

                document.getElementById('forecastContainer').style.display = 'block';
            } catch (err) {
                alert("Fehler beim Abrufen der Wetterdaten.");
            }
            btn.innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> Abrufen`;
        }

        function renderForecast(daily) {
            const grid = document.getElementById('forecastGrid');
            grid.innerHTML = '';
            
            const days = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];
            
            for(let i=0; i<5; i++) { // Show 5 days
                const date = new Date(daily.time[i]);
                const dayName = i === 0 ? 'Heute' : days[date.getDay()];
                const max = Math.round(daily.temperature_2m_max[i]);
                const min = Math.round(daily.temperature_2m_min[i]);
                const rain = daily.precipitation_probability_max[i];
                const code = daily.weathercode[i];

                let icon = 'fa-cloud'; let color = '#aaa';
                if(code === 0) { icon = 'fa-sun'; color = '#ffc107'; }
                else if(code <= 3) { icon = 'fa-cloud-sun'; color = '#ffd54f'; }
                else if(code <= 67) { icon = 'fa-cloud-rain'; color = '#4aa5ff'; }
                else if(code <= 77) { icon = 'fa-snowflake'; color = '#fff'; }
                else if(code >= 95) { icon = 'fa-cloud-bolt'; color = '#ffeb3b'; }

                grid.innerHTML += `
                    <div class="forecast-day">
                        <span class="day-name">${dayName}</span>
                        <i class="fa-solid ${icon}" style="color: ${color}"></i>
                        <span class="temps">${max}° <span style="color:var(--text-muted);font-weight:400;font-size:0.8rem;">${min}°</span></span>
                        <span class="rain"><i class="fa-solid fa-droplet"></i> ${rain}%</span>
                    </div>
                `;
            }
        }

        function generateSmartSuggestions(daily) {
            const tagsContainer = document.getElementById('suggestionTags');
            tagsContainer.innerHTML = '';
            document.getElementById('smartSuggestions').style.display = 'block';

            let suggestions = new Set();
            const maxTemp = Math.max(...daily.temperature_2m_max);
            const minTemp = Math.min(...daily.temperature_2m_min);
            const maxRain = Math.max(...daily.precipitation_probability_max);

            if(maxTemp > 25) { suggestions.add({n: 'Sonnencreme', c: 'Hygiene'}); suggestions.add({n: 'Badehose/Bikini', c: 'Kleidung'}); suggestions.add({n: 'Sonnenbrille', c: 'Kleidung'});}
            if(minTemp < 10) { suggestions.add({n: 'Dicke Jacke', c: 'Kleidung'}); suggestions.add({n: 'Mütze', c: 'Kleidung'}); }
            if(maxRain > 40) { suggestions.add({n: 'Regenschirm', c: 'Zubehör'}); suggestions.add({n: 'Regenjacke', c: 'Kleidung'}); }
            suggestions.add({n: 'Reisepass', c: 'Dokumente'});
            suggestions.add({n: 'Ladekabel', c: 'Elektronik'});

            if(suggestions.size === 0) suggestions.add({n: 'Gute Laune', c: 'Zubehör'});

            suggestions.forEach(item => {
                // Check if category exists, if not use first
                if(!categories.includes(item.c) && item.c !== 'Zubehör') item.c = categories[0];
                if(item.c === 'Zubehör' && !categories.includes('Zubehör')) { categories.push('Zubehör'); updateCategoryList(); }

                tagsContainer.innerHTML += `
                    <div class="s-tag" onclick="quickAdd('${item.n}', '${item.c}')" title="Klicke, um es in einen Koffer zu packen">
                        <i class="fa-solid fa-plus"></i> ${item.n}
                    </div>
                `;
            });
        }

        function quickAdd(name, cat) {
            if(luggages.length === 0) { alert("Bitte erstile zuerst ein Gepäckstück in der Halle!"); return; }
            // Let the user choose luggage if multiple exist, or just auto-add to first
            const target = luggages[0]; // Simple logic: add to first luggage
            target.items.push({ id: Date.now().toString(), name: name, cat: cat, packed: false });
            alert(`"${name}" wurde zu "${target.name}" hinzugefügt!`);
            renderHall(); updateDashboard();
        }

        // --- DASHBOARD (Progress) ---
        function updateDashboard() {
            let total = 0; let packed = 0;
            luggages.forEach(l => { total += l.items.length; packed += l.items.filter(i => i.packed).length; });
            const percent = total === 0 ? 0 : Math.round((packed / total) * 100);
            document.getElementById('globalProgressText').innerText = `${percent}%`;
            document.getElementById('globalProgressBar').style.width = `${percent}%`;
        }

        // --- CATEGORIES ---
        function updateCategoryList() {
            const list = document.getElementById('categoryList'); const select = document.getElementById('modalCatSelect');
            list.innerHTML = ''; select.innerHTML = '';
            categories.forEach(cat => {
                list.innerHTML += `<option value="${cat}">${cat}</option>`;
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        }
        function addCategory() {
            const val = document.getElementById('newCategory').value.trim();
            if (val && !categories.includes(val)) { categories.push(val); document.getElementById('newCategory').value = ''; updateCategoryList(); }
        }

        // --- LUGGAGE LOGIC ---
        function addLuggage() {
            const name = document.getElementById('luggageName').value.trim() || "Mein Gepäck";
            const type = document.getElementById('luggageType').value;
            const w = parseInt(document.getElementById('luggageW').value) || 40;
            const h = parseInt(document.getElementById('luggageH').value) || 55;
            const weight = document.getElementById('luggageWeight').value || 8;
            const deadline = document.getElementById('luggageDeadline').value;

            luggages.push({ id: Date.now().toString(), type, name, w, h, weight, deadline, items: [] });
            document.getElementById('luggageName').value = ''; renderHall(); updateDashboard();
        }

        function deleteCurrentLuggage() {
            if(confirm("Gepäckstück löschen?")) {
                luggages = luggages.filter(l => l.id !== currentOpenLuggageId);
                closeModal(); renderHall(); updateDashboard();
            }
        }

        // --- RENDER HALL ---
        function renderHall() {
            const area = document.getElementById('hallArea');
            area.innerHTML = '';

            if (luggages.length === 0) {
                area.innerHTML = `<div style="text-align:center; width:100%; margin-top:40px; color:var(--text-muted);">
                    <i class="fa-solid fa-boxes-packing" style="font-size:3.5rem; opacity:0.2; margin-bottom:15px;"></i>
                    <p>Halle ist leer.</p></div>`;
                return;
            }

            luggages.forEach(l => {
                const scale = 3.5; // Slightly smaller to fit mobile better
                const calcWidth = Math.max(l.w * scale, 90); 
                const calcHeight = Math.max(l.h * scale, 110);

                let icon = l.type === 'rucksack' ? 'fa-backpack' : (l.type === 'koffer' ? 'fa-suitcase' : 'fa-suitcase-rolling');
                const t = l.items.length; const p = l.items.filter(i => i.packed).length;
                const percent = t === 0 ? 0 : (p / t) * 100;

                let details = '';
                if(l.type === 'koffer') details = '<div class="koffer-strap"></div><div class="koffer-strap-2"></div>';

                const html = `
                    <div class="luggage-wrapper luggage-type-${l.type}" onclick="openModal('${l.id}')">
                        <div class="luggage-info-tag"><h3><i class="fa-solid ${icon}"></i> ${l.name}</h3><span>${p}/${t} Items</span></div>
                        <div class="luggage-body" style="width:${calcWidth}px; height:${calcHeight}px;">
                            ${details}
                            <div class="mini-progress"><div class="mini-progress-fill" style="width:${percent}%"></div></div>
                        </div>
                    </div>
                `;
                area.innerHTML += html;
            });
        }

        // --- MODAL ---
        function openModal(id) {
            currentOpenLuggageId = id; renderModalContent();
            document.getElementById('luggageModal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('luggageModal').classList.remove('active');
            currentOpenLuggageId = null;
        }

        function renderModalContent() {
            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            if(!lug) return;

            document.getElementById('modalTitle').innerHTML = `<i class="fa-solid fa-suitcase"></i> ${lug.name}`;
            document.getElementById('modalDim').innerText = `${lug.w}x${lug.h} cm`;
            document.getElementById('modalWeight').innerText = `${lug.weight} kg`;
            document.getElementById('modalDeadline').innerText = lug.deadline ? new Date(lug.deadline).toLocaleDateString('de-DE') : '-';
            
            const p = lug.items.filter(i => i.packed).length;
            document.getElementById('modalProgress').innerText = `${p} / ${lug.items.length}`;

            const listContainer = document.getElementById('modalItemsList');
            listContainer.innerHTML = '';

            if(lug.items.length === 0) { listContainer.innerHTML = `<p style="text-align:center; color:var(--text-muted); margin: 40px 0;">Noch leer.</p>`; return; }

            categories.forEach(cat => {
                const catItems = lug.items.filter(i => i.cat === cat);
                if(catItems.length === 0) return;

                let html = `<div style="margin-bottom: 20px;"><div style="font-weight:600; color:var(--accent-gold); margin-bottom:10px; font-size:0.9rem; text-transform:uppercase;">${cat}</div>`;
                catItems.forEach(item => {
                    html += `
                        <div class="list-item ${item.packed ? 'packed' : ''}">
                            <div class="item-left">
                                <input type="checkbox" ${item.packed ? 'checked' : ''} onchange="toggleItem('${item.id}')">
                                <span class="item-name">${item.name}</span>
                            </div>
                            <button style="background:none; border:none; color:var(--danger-red); font-size:1.2rem; padding:5px; cursor:pointer;" onclick="deleteItem('${item.id}')"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    `;
                });
                html += `</div>`;
                listContainer.innerHTML += html;
            });
        }

        // --- ITEM LOGIC IN MODAL ---
        function addItemToCurrentLuggage() {
            const input = document.getElementById('modalNewItem');
            const cat = document.getElementById('modalCatSelect').value;
            const name = input.value.trim();
            if(!name || !currentOpenLuggageId) return;

            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            lug.items.push({ id: Date.now().toString() + Math.random().toString(16).substr(2,4), name: name, cat: cat, packed: false });
            
            input.value = ''; input.focus();
            renderModalContent(); renderHall(); updateDashboard();
        }
        function toggleItem(id) {
            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            const item = lug.items.find(i => i.id === id);
            if(item) item.packed = !item.packed;
            renderModalContent(); renderHall(); updateDashboard();
        }
        function deleteItem(id) {
            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            lug.items = lug.items.filter(i => i.id !== id);
            renderModalContent(); renderHall(); updateDashboard();
        }

        // --- IMPORT / EXPORT (100% KOMPATIBEL) ---
        function exportData() { downloadJSON({ categories, luggages }, 'reisedaten_koffer.json'); }
        function importData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = e => { 
                try { 
                    const data = JSON.parse(e.target.result);
                    if (data && data.luggages) {
                        if(data.categories) categories = data.categories;
                        luggages = data.luggages;
                        updateCategoryList(); renderHall(); updateDashboard();
                        alert("Erfolgreich importiert!");
                    } else alert("Falsches Format.");
                } catch (err) { alert("Fehler beim Lesen!"); }
            };
            reader.readAsText(file); event.target.value = "";
        }
        function downloadJSON(data, filename) {
            const a = document.createElement('a');
            a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
            a.download = filename; a.click();
        }

        // --- PDF GENERATOR ---
        function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.setFontSize(22); doc.setTextColor(22, 27, 34); doc.text("Packliste", 14, 20);
            let startY = 30;

            if(luggages.length === 0) { doc.text("Leer.", 14, startY); doc.save("Packliste.pdf"); return; }

            luggages.forEach((lug) => {
                if(startY > 250) { doc.addPage(); startY = 20; }
                doc.setFontSize(14); doc.text(`${lug.name} (${lug.type})`, 14, startY);
                doc.setFontSize(10); doc.setTextColor(100); doc.text(`Maße: ${lug.w}x${lug.h} | ${lug.weight}kg`, 14, startY + 6);
                startY += 12;

                const tableData = [...lug.items].sort((a,b) => a.cat.localeCompare(b.cat)).map(i => [i.packed ? "[ X ]" : "[   ]", i.cat, i.name]);
                if(tableData.length === 0) tableData.push(["-", "-", "Leer"]);

                doc.autoTable({
                    startY: startY, head: [['St', 'Kat', 'Name']], body: tableData, theme: 'grid',
                    headStyles: { fillColor: [255, 193, 7], textColor: [0,0,0] },
                    columnStyles: { 0: { cellWidth: 15 }, 1: { cellWidth: 40 } }
                });
                startY = doc.lastAutoTable.finalY + 15;
            });
            doc.save("Gepaeck.pdf");
        }
    </script>
</body>
</html>
