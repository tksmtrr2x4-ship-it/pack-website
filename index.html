<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-End Travel Packer - Ultimate Edition</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg-dark: #12151c;
            --bg-panel: #1e2430;
            --bg-input: #0d1015;
            --bg-glass: rgba(30, 36, 48, 0.7);
            --accent-gold: #ffc107;
            --accent-gold-hover: #e0a800;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --border-color: #2d3542;
            --success-green: #2ea043;
            --danger-red: #da3633;
            --cm-to-px: 4px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            background-image: radial-gradient(circle at 50% -10%, rgba(255, 193, 7, 0.05) 0%, transparent 40%);
            min-height: 100vh; overflow-x: hidden; transition: all 0.3s ease;
        }

        .app-container { max-width: 1600px; margin: 0 auto; padding: 20px; transition: max-width 0.4s ease; }

        /* --- FORCE MOBILE MODE --- */
        body.force-mobile .app-container { max-width: 500px; padding: 10px; }
        body.force-mobile .layout { grid-template-columns: 1fr; }
        body.force-mobile .tool-bar { flex-direction: column; align-items: stretch; gap: 15px; }
        body.force-mobile .weather-widget, body.force-mobile .progress-widget { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;}
        body.force-mobile .header-actions { flex-wrap: wrap; justify-content: flex-end; gap: 5px; }
        body.force-mobile .luggage-area { justify-content: center; }

        /* --- HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px;
        }
        .logo { font-size: 1.6rem; font-weight: 700; color: var(--accent-gold); display: flex; align-items: center; gap: 12px; letter-spacing: -0.5px;}
        .header-actions { display: flex; gap: 10px; align-items: center; }

        button {
            background-color: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border-color);
            padding: 9px 16px; border-radius: 8px; cursor: pointer; font-weight: 500;
            transition: all 0.2s; display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
        }
        button:hover { background-color: #272f3e; border-color: #3e485a; }
        button.primary { background-color: var(--accent-gold); color: #000; border: none; font-weight: 600;}
        button.primary:hover { background-color: var(--accent-gold-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,193,7,0.2);}
        button.icon-btn { padding: 8px 12px; }
        button.toggle-btn { background: #1a202a; color: var(--accent-gold); border-color: var(--accent-gold); }
        button.toggle-btn.active { background: var(--accent-gold); color: #000; }

        /* --- NEW: TOOL BAR (Glassmorphism) --- */
        .tool-bar {
            background: var(--bg-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color); border-radius: 12px;
            padding: 15px 25px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .progress-widget { flex: 1; padding-right: 25px; border-right: 1px solid var(--border-color); }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); font-weight: 600;}
        .progress-bar-container { background: var(--bg-input); border-radius: 6px; height: 10px; width: 100%; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);}
        .progress-bar-fill { background: linear-gradient(90deg, var(--success-green), #4add6d); height: 100%; width: 0%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .weather-widget { flex: 1; padding-left: 25px; display: flex; align-items: center; gap: 15px; justify-content: space-between;}
        .weather-input-group { display: flex; gap: 5px; flex: 1;}
        .weather-input-group input { flex: 1; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 6px; font-size: 0.9rem;}
        .weather-display { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 8px; min-width: 130px; justify-content: center; border: 1px solid rgba(255,255,255,0.05);}
        .weather-display i { font-size: 1.5rem; color: var(--accent-gold); }
        .weather-temp { font-size: 1.2rem; font-weight: 700; }
        .weather-desc { font-size: 0.75rem; color: var(--text-muted); display: block;}

        /* --- LAYOUT GRID --- */
        .layout { display: grid; grid-template-columns: 320px 1fr; gap: 30px; align-items: start; }
        @media (max-width: 1000px) { .layout { grid-template-columns: 1fr; } }

        /* Panels */
        .panel {
            background-color: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 22px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .panel-title {
            font-size: 1.05rem; font-weight: 600; margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
            color: var(--text-main); border-bottom: 1px solid var(--border-color); padding-bottom: 12px;
        }

        .form-group { margin-bottom: 15px; }
        .row-group { display: flex; gap: 10px; }
        .row-group .form-group { flex: 1; }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 500;}
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-color);
            color: var(--text-main); padding: 10px; border-radius: 6px; font-size: 0.9rem; transition: 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent-gold); box-shadow: 0 0 0 2px rgba(255,193,7,0.1);}
        .hidden { display: none; }

        /* --- THE HALL (Closed Luggage) --- */
        .hall-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 1.3rem; font-weight: 600;}
        .luggage-area { display: flex; flex-wrap: wrap; gap: 40px; justify-content: flex-start; align-items: flex-end; padding-bottom: 50px;}
        
        .luggage-wrapper {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s; position: relative;
        }
        .luggage-wrapper:hover { transform: translateY(-8px) scale(1.02); filter: drop-shadow(0 15px 25px rgba(255,193,7,0.1)); }

        .luggage-info-tag {
            background: rgba(13, 16, 21, 0.9); border: 1px solid var(--border-color); border-bottom: 2px solid var(--accent-gold);
            border-radius: 8px; padding: 10px 14px; margin-bottom: 15px; text-align: center; z-index: 10; backdrop-filter: blur(4px);
        }
        .luggage-info-tag h3 { color: var(--text-main); font-size: 0.95rem; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; justify-content: center;}
        .luggage-info-tag span { color: var(--text-muted); font-size: 0.75rem; font-weight: 500;}

        /* Visual Luggage Designs */
        .luggage-body { position: relative; background: linear-gradient(135deg, #2c3340 0%, #1a1f29 100%); border: 2px solid #4a5468; box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255,255,255,0.05); }
        .mini-progress { position: absolute; bottom: 12px; left: 10%; width: 80%; height: 6px; background: rgba(0,0,0,0.6); border-radius: 3px; overflow: hidden; }
        .mini-progress-fill { background: var(--accent-gold); height: 100%; width: 0%; transition: 0.3s;}

        .luggage-type-trolley .luggage-body { border-radius: 12px; }
        .luggage-type-trolley .luggage-body::before { content: ''; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 30%; height: 15px; border: 4px solid #7a8498; border-bottom: none; border-radius: 5px 5px 0 0; }
        .luggage-type-trolley .luggage-body::after { content: ''; position: absolute; bottom: -8px; left: 15%; width: 70%; height: 8px; border-left: 12px solid #0a0c10; border-right: 12px solid #0a0c10; }
        .trolley-stripes { position: absolute; top: 10%; left: 20%; width: 60%; height: 80%; background: repeating-linear-gradient(to bottom, transparent, transparent 15px, rgba(0,0,0,0.15) 15px, rgba(0,0,0,0.15) 20px); }

        .luggage-type-koffer .luggage-body { border-radius: 8px; background: linear-gradient(135deg, #3c4454 0%, #242a35 100%); }
        .luggage-type-koffer .luggage-body::before { content: ''; position: absolute; top: 50%; right: -12px; transform: translateY(-50%); width: 10px; height: 40px; border: 4px solid #7a8498; border-left: none; border-radius: 0 5px 5px 0; }
        .koffer-strap { position: absolute; top: 0; left: 30%; width: 12%; height: 100%; background: #0a0c10; opacity: 0.7; box-shadow: 2px 0 5px rgba(0,0,0,0.5);}
        .koffer-strap-2 { left: 60%; }

        .luggage-type-rucksack .luggage-body { border-radius: 35% 35% 15% 15% / 20% 20% 10% 10%; background: linear-gradient(135deg, #354a3a 0%, #1e2b21 100%); border-color: #4a6350; }
        .luggage-type-rucksack .luggage-body::before { content: ''; position: absolute; top: 10%; left: -10px; width: calc(100% + 20px); height: 80%; border-left: 8px solid #1a241c; border-right: 8px solid #1a241c; border-radius: 15px; z-index: -1; }
        .rucksack-pocket { position: absolute; bottom: 25%; left: 20%; width: 60%; height: 35%; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; box-shadow: 0 -2px 5px rgba(0,0,0,0.2);}

        /* --- THE MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--bg-dark); border: 1px solid var(--accent-gold);
            width: 90%; max-width: 800px; max-height: 90vh; border-radius: 16px;
            display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            transform: scale(0.95) translateY(20px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }

        .modal-header {
            padding: 20px 30px; border-bottom: 1px solid var(--border-color); background: var(--bg-panel);
            display: flex; justify-content: space-between; align-items: center; border-radius: 16px 16px 0 0;
        }
        .modal-header h2 { color: var(--accent-gold); font-size: 1.4rem;}
        .close-modal { background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; transition: 0.2s;}
        .close-modal:hover { color: white; transform: rotate(90deg);}

        .modal-body { padding: 30px; overflow-y: auto; flex-grow: 1; }
        
        .modal-stats { display: flex; gap: 15px; margin-bottom: 30px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.02);}
        .stat-box { flex: 1; text-align: center; border-right: 1px solid var(--border-color); }
        .stat-box:last-child { border-right: none; }
        .stat-box span { display: block; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        .stat-box strong { font-size: 1.2rem; font-weight: 700;}

        .cat-section { margin-bottom: 25px; }
        .cat-title { font-weight: 600; color: var(--text-muted); border-bottom: 2px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;}
        
        .list-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; background: var(--bg-input); margin-bottom: 8px; border-radius: 8px;
            border-left: 4px solid var(--accent-gold); transition: all 0.2s ease;
        }
        .list-item:hover { background: #1a202a; transform: translateX(4px);}
        .list-item.packed { opacity: 0.5; border-left-color: var(--success-green); background: rgba(46, 160, 67, 0.05);}
        .list-item.packed .item-name { text-decoration: line-through; }
        
        .item-left { display: flex; align-items: center; gap: 15px; }
        .item-left input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--success-green); cursor: pointer;}
        .item-name { font-size: 1.05rem; font-weight: 500;}
        
        .item-delete { color: var(--danger-red); background: none; border: none; cursor: pointer; padding: 6px; font-size: 1.1rem;}
        .item-delete:hover { transform: scale(1.2); }

        .modal-footer {
            padding: 20px 30px; border-top: 1px solid var(--border-color); background: var(--bg-panel);
            display: flex; gap: 15px; border-radius: 0 0 16px 16px;
        }
        .modal-footer input { flex: 2; padding: 12px;}
        .modal-footer select { flex: 1; padding: 12px;}
        .modal-footer button { padding: 12px 20px; }

    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        <!-- HEADER -->
        <header>
            <div class="logo"><i class="fa-solid fa-plane-departure"></i> Packer Pro</div>
            <div class="header-actions">
                <button class="toggle-btn" id="mobileToggleBtn" onclick="toggleMobile()"><i class="fa-solid fa-mobile-screen"></i> Mobile View</button>
                <div style="width: 1px; height: 20px; background: var(--border-color); margin: 0 5px;"></div>
                <button onclick="document.getElementById('importData').click()"><i class="fa-solid fa-file-import"></i> Import</button>
                <input type="file" id="importData" class="hidden" accept=".json" onchange="importData(event)">
                <button onclick="exportData()"><i class="fa-solid fa-file-export"></i> Export</button>
                <button class="primary" onclick="generatePDF()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
            </div>
        </header>

        <!-- TOOL BAR (Weather & Progress) -->
        <nav class="tool-bar">
            <div class="progress-widget">
                <div class="progress-header">
                    <span>Reise-Fortschritt</span>
                    <span id="globalProgressText" style="color: var(--accent-gold);">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="globalProgressBar"></div>
                </div>
            </div>

            <div class="weather-widget">
                <div class="weather-input-group">
                    <input type="text" id="weatherCity" placeholder="Reiseziel für Live-Wetter..." onkeypress="if(event.key === 'Enter') fetchWeather()">
                    <button class="primary icon-btn" onclick="fetchWeather()" title="Wetter abrufen"><i class="fa-solid fa-satellite-dish"></i></button>
                </div>
                <div class="weather-display" id="weatherDisplay">
                    <i class="fa-solid fa-temperature-half"></i>
                    <div>
                        <span class="weather-temp">--°C</span>
                        <span class="weather-desc">Wetterdaten</span>
                    </div>
                </div>
            </div>
        </nav>

        <main class="layout">
            <!-- LEFT COLUMN -->
            <div class="left-column">
                
                <div class="panel">
                    <div class="panel-title"><i class="fa-solid fa-box-open"></i> Neues Gepäck</div>
                    <div class="form-group">
                        <label>Typ</label>
                        <select id="luggageType">
                            <option value="koffer">Koffer (Hartschale)</option>
                            <option value="trolley">Trolley (Handgepäck)</option>
                            <option value="rucksack">Rucksack</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Name</label><input type="text" id="luggageName" placeholder="z.B. Strandurlaub...">
                    </div>
                    <div class="row-group">
                        <div class="form-group"><label>Breite (cm)</label><input type="number" id="luggageW" value="40" min="10" max="100"></div>
                        <div class="form-group"><label>Höhe (cm)</label><input type="number" id="luggageH" value="55" min="10" max="120"></div>
                    </div>
                    <div class="row-group">
                        <div class="form-group"><label>Max kg</label><input type="number" id="luggageWeight" value="8" min="1" step="0.5"></div>
                        <div class="form-group"><label>Frist</label><input type="date" id="luggageDeadline"></div>
                    </div>
                    <button class="primary" style="width: 100%; justify-content: center; margin-top: 5px; padding: 12px;" onclick="addLuggage()">
                        <i class="fa-solid fa-plus"></i> In die Halle stellen
                    </button>
                </div>

                <div class="panel">
                    <div class="panel-title"><span><i class="fa-solid fa-tags"></i> Kategorien</span></div>
                    <div class="row-group">
                        <input type="text" id="newCategory" placeholder="Neue Kategorie...">
                        <button class="primary icon-btn" onclick="addCategory()"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div class="form-group" style="margin-top: 15px;">
                        <select id="categoryList" size="4" style="height: 100px;"></select>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: The Hall -->
            <div class="right-column">
                <div class="hall-header"><i class="fa-solid fa-warehouse" style="color: var(--accent-gold);"></i> Packhalle</div>
                <div class="luggage-area" id="hallArea"></div>
            </div>
        </main>
    </div>

    <!-- THE MODAL -->
    <div class="modal-overlay" id="luggageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"><i class="fa-solid fa-suitcase"></i> Koffer</h2>
                <div style="display: flex; gap: 15px;">
                    <button class="icon-btn" style="border-color: var(--danger-red); color: var(--danger-red);" onclick="deleteCurrentLuggage()" title="Löschen"><i class="fa-solid fa-trash-can"></i></button>
                    <button class="close-modal" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            
            <div class="modal-body">
                <div class="modal-stats">
                    <div class="stat-box"><span>Maße</span><strong id="modalDim">--</strong></div>
                    <div class="stat-box"><span>Gewicht</span><strong id="modalWeight">--</strong></div>
                    <div class="stat-box"><span>Frist</span><strong id="modalDeadline">--</strong></div>
                    <div class="stat-box"><span>Status</span><strong id="modalProgress" style="color: var(--success-green);">--</strong></div>
                </div>
                <div id="modalItemsList"></div>
            </div>

            <div class="modal-footer">
                <input type="text" id="modalNewItem" placeholder="Gegenstand hinzufügen..." onkeypress="if(event.key === 'Enter') addItemToCurrentLuggage()">
                <select id="modalCatSelect"></select>
                <button class="primary" onclick="addItemToCurrentLuggage()"><i class="fa-solid fa-plus"></i> Packen</button>
            </div>
        </div>
    </div>

    <script>
        // --- STATE ---
        let categories = ["Kleidung", "Hygiene", "Elektronik", "Dokumente"];
        let luggages = [];
        let currentOpenLuggageId = null;

        // --- INIT ---
        window.onload = () => {
            updateCategoryList();
            updateDashboard();
            renderHall();
        };

        // --- MOBILE TOGGLE ---
        function toggleMobile() {
            const body = document.body;
            const btn = document.getElementById('mobileToggleBtn');
            body.classList.toggle('force-mobile');
            if(body.classList.contains('force-mobile')) {
                btn.classList.add('active');
                btn.innerHTML = `<i class="fa-solid fa-desktop"></i> Desktop View`;
            } else {
                btn.classList.remove('active');
                btn.innerHTML = `<i class="fa-solid fa-mobile-screen"></i> Mobile View`;
            }
        }

        // --- LIVE WEATHER API (Open-Meteo) ---
        async function fetchWeather() {
            const city = document.getElementById('weatherCity').value.trim();
            const display = document.getElementById('weatherDisplay');
            if(!city) return;

            display.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i><div><span class="weather-temp">Lädt..</span><span class="weather-desc">Suche Ort</span></div>`;

            try {
                // 1. Geocoding (Ort zu Koordinaten)
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=de`);
                const geoData = await geoRes.json();
                
                if(!geoData.results || geoData.results.length === 0) {
                    display.innerHTML = `<i class="fa-solid fa-circle-exclamation" style="color:var(--danger-red)"></i><div><span class="weather-temp">Fehler</span><span class="weather-desc">Nicht gefunden</span></div>`;
                    return;
                }

                const lat = geoData.results[0].latitude;
                const lon = geoData.results[0].longitude;

                // 2. Wetter abrufen
                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const wData = await wRes.json();

                const temp = Math.round(wData.current_weather.temperature);
                const code = wData.current_weather.weathercode;
                
                // WMO Weather Codes mapping to FontAwesome Icons & Text
                let icon = 'fa-cloud'; let text = 'Bewölkt';
                if(code === 0) { icon = 'fa-sun'; text = 'Klar'; }
                else if(code >= 1 && code <= 3) { icon = 'fa-cloud-sun'; text = 'Wolkig'; }
                else if(code >= 51 && code <= 67) { icon = 'fa-cloud-rain'; text = 'Regen'; }
                else if(code >= 71 && code <= 77) { icon = 'fa-snowflake'; text = 'Schnee'; }
                else if(code >= 95) { icon = 'fa-cloud-bolt'; text = 'Gewitter'; }

                display.innerHTML = `
                    <i class="fa-solid ${icon}"></i>
                    <div>
                        <span class="weather-temp">${temp}°C</span>
                        <span class="weather-desc">${text}</span>
                    </div>
                `;
            } catch (err) {
                display.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i><div><span class="weather-temp">API</span><span class="weather-desc">Fehler</span></div>`;
            }
        }

        // --- DASHBOARD (Progress) ---
        function updateDashboard() {
            let totalItems = 0; let packedItems = 0;
            luggages.forEach(l => {
                totalItems += l.items.length;
                packedItems += l.items.filter(i => i.packed).length;
            });
            const percent = totalItems === 0 ? 0 : Math.round((packedItems / totalItems) * 100);
            
            document.getElementById('globalProgressText').innerText = `${percent}% (${packedItems}/${totalItems})`;
            document.getElementById('globalProgressBar').style.width = `${percent}%`;
        }

        // --- CATEGORIES ---
        function updateCategoryList() {
            const list = document.getElementById('categoryList');
            const select = document.getElementById('modalCatSelect');
            list.innerHTML = ''; select.innerHTML = '';
            categories.forEach(cat => {
                list.innerHTML += `<option value="${cat}">${cat}</option>`;
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        }
        function addCategory() {
            const val = document.getElementById('newCategory').value.trim();
            if (val && !categories.includes(val)) {
                categories.push(val); document.getElementById('newCategory').value = ''; updateCategoryList();
            }
        }

        // --- LUGGAGE LOGIC ---
        function addLuggage() {
            const name = document.getElementById('luggageName').value.trim() || "Gepäck";
            const type = document.getElementById('luggageType').value;
            const w = parseInt(document.getElementById('luggageW').value) || 40;
            const h = parseInt(document.getElementById('luggageH').value) || 55;
            const weight = document.getElementById('luggageWeight').value || 8;
            const deadline = document.getElementById('luggageDeadline').value;

            luggages.push({ id: Date.now().toString(), type, name, w, h, weight, deadline, items: [] });
            document.getElementById('luggageName').value = '';
            renderHall(); updateDashboard();
        }

        function deleteCurrentLuggage() {
            if(confirm("Gepäckstück inkl. Inhalt wirklich löschen?")) {
                luggages = luggages.filter(l => l.id !== currentOpenLuggageId);
                closeModal(); renderHall(); updateDashboard();
            }
        }

        // --- RENDER HALL ---
        function renderHall() {
            const area = document.getElementById('hallArea');
            area.innerHTML = '';

            if (luggages.length === 0) {
                area.innerHTML = `<div style="text-align:center; width:100%; margin-top:40px; color:var(--text-muted);">
                    <i class="fa-solid fa-boxes-packing" style="font-size:3rem; opacity:0.3; margin-bottom:15px;"></i>
                    <p>Die Halle ist leer. Neues Gepäck links erstellen.</p></div>`;
                return;
            }

            luggages.forEach(l => {
                const scale = 4; 
                const calcWidth = Math.max(l.w * scale, 100); 
                const calcHeight = Math.max(l.h * scale, 120);

                let icon = 'fa-suitcase-rolling';
                if(l.type === 'koffer') icon = 'fa-suitcase';
                if(l.type === 'rucksack') icon = 'fa-backpack';

                const tItems = l.items.length;
                const pItems = l.items.filter(i => i.packed).length;
                const percent = tItems === 0 ? 0 : (pItems / tItems) * 100;

                let detailsHtml = '';
                if(l.type === 'trolley') detailsHtml = '<div class="trolley-stripes"></div>';
                if(l.type === 'koffer') detailsHtml = '<div class="koffer-strap"></div><div class="koffer-strap-2"></div>';
                if(l.type === 'rucksack') detailsHtml = '<div class="rucksack-pocket"></div>';

                const html = `
                    <div class="luggage-wrapper luggage-type-${l.type}" onclick="openModal('${l.id}')">
                        <div class="luggage-info-tag">
                            <h3><i class="fa-solid ${icon}"></i> ${l.name}</h3>
                            <span>${pItems}/${tItems} Items</span>
                        </div>
                        <div class="luggage-body" style="width:${calcWidth}px; height:${calcHeight}px;">
                            ${detailsHtml}
                            <div class="mini-progress"><div class="mini-progress-fill" style="width:${percent}%"></div></div>
                        </div>
                    </div>
                `;
                area.innerHTML += html;
            });
        }

        // --- MODAL ---
        function openModal(id) {
            currentOpenLuggageId = id; renderModalContent();
            document.getElementById('luggageModal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('luggageModal').classList.remove('active');
            currentOpenLuggageId = null;
        }

        function renderModalContent() {
            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            if(!lug) return;

            let icon = lug.type === 'rucksack' ? 'fa-backpack' : (lug.type === 'koffer' ? 'fa-suitcase' : 'fa-suitcase-rolling');
            document.getElementById('modalTitle').innerHTML = `<i class="fa-solid ${icon}"></i> ${lug.name}`;
            document.getElementById('modalDim').innerText = `${lug.w}x${lug.h} cm`;
            document.getElementById('modalWeight').innerText = `${lug.weight} kg`;
            document.getElementById('modalDeadline').innerText = lug.deadline ? new Date(lug.deadline).toLocaleDateString('de-DE') : '-';
            
            const p = lug.items.filter(i => i.packed).length;
            document.getElementById('modalProgress').innerText = `${p} / ${lug.items.length}`;

            const listContainer = document.getElementById('modalItemsList');
            listContainer.innerHTML = '';

            if(lug.items.length === 0) {
                listContainer.innerHTML = `<p style="text-align:center; color:var(--text-muted); margin: 40px 0;">Koffer ist noch leer.</p>`;
                return;
            }

            categories.forEach(cat => {
                const catItems = lug.items.filter(i => i.cat === cat);
                if(catItems.length === 0) return;

                let html = `<div class="cat-section"><div class="cat-title">${cat}</div>`;
                catItems.forEach(item => {
                    html += `
                        <div class="list-item ${item.packed ? 'packed' : ''}">
                            <div class="item-left">
                                <input type="checkbox" ${item.packed ? 'checked' : ''} onchange="toggleItem('${item.id}')">
                                <span class="item-name">${item.name}</span>
                            </div>
                            <button class="item-delete" onclick="deleteItem('${item.id}')"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    `;
                });
                html += `</div>`;
                listContainer.innerHTML += html;
            });
        }

        // --- ITEM LOGIC IN MODAL ---
        function addItemToCurrentLuggage() {
            const input = document.getElementById('modalNewItem');
            const cat = document.getElementById('modalCatSelect').value;
            const name = input.value.trim();
            if(!name || !currentOpenLuggageId) return;

            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            lug.items.push({ id: Date.now().toString() + Math.random().toString(16).substr(2,4), name: name, cat: cat, packed: false });
            
            input.value = ''; input.focus();
            renderModalContent(); renderHall(); updateDashboard();
        }

        function toggleItem(id) {
            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            const item = lug.items.find(i => i.id === id);
            if(item) item.packed = !item.packed;
            renderModalContent(); renderHall(); updateDashboard();
        }

        function deleteItem(id) {
            const lug = luggages.find(l => l.id === currentOpenLuggageId);
            lug.items = lug.items.filter(i => i.id !== id);
            renderModalContent(); renderHall(); updateDashboard();
        }

        // --- IMPORT / EXPORT (100% KOMPATIBEL) ---
        function exportData() { downloadJSON({ categories, luggages }, 'reisedaten_koffer.json'); }
        
        function importData(event) {
            readJSON(event, (data) => {
                if (data && data.luggages) {
                    if(data.categories && Array.isArray(data.categories)) categories = data.categories;
                    luggages = data.luggages;
                    updateCategoryList(); renderHall(); updateDashboard();
                    alert("Daten nahtlos importiert!");
                } else alert("Falsches Dateiformat.");
            });
        }

        function downloadJSON(data, filename) {
            const a = document.createElement('a');
            a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
            a.download = filename; a.click();
        }

        function readJSON(event, callback) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = e => { try { callback(JSON.parse(e.target.result)); } catch (err) { alert("Fehler beim Lesen!"); }};
            reader.readAsText(file); event.target.value = "";
        }

        // --- PDF GENERATOR ---
        function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.setFontSize(22); doc.setTextColor(22, 27, 34); doc.text("Travel-Packer Checkliste", 14, 20);
            let startY = 30;

            if(luggages.length === 0) { doc.setFontSize(12); doc.text("Halle ist leer.", 14, startY); doc.save("Packliste.pdf"); return; }

            luggages.forEach((lug) => {
                if(startY > 250) { doc.addPage(); startY = 20; }
                doc.setFontSize(14); doc.setTextColor(22, 27, 34);
                let deadlineStr = lug.deadline ? ` | Frist: ${new Date(lug.deadline).toLocaleDateString('de-DE')}` : '';
                doc.text(`Gepaeck: ${lug.name} (${lug.type.toUpperCase()})`, 14, startY);
                
                doc.setFontSize(10); doc.setTextColor(100);
                doc.text(`Masse: ${lug.w}x${lug.h} cm | Max. ${lug.weight} kg${deadlineStr}`, 14, startY + 6);
                startY += 12;

                const sortedItems = [...lug.items].sort((a,b) => a.cat.localeCompare(b.cat));
                const tableData = sortedItems.map(item => [item.packed ? "[ X ]" : "[   ]", item.cat, item.name]);
                if(tableData.length === 0) { tableData.push(["-", "-", "Koffer ist leer."]); }

                doc.autoTable({
                    startY: startY, head: [['Status', 'Kategorie', 'Gegenstand']], body: tableData, theme: 'grid',
                    headStyles: { fillColor: [255, 193, 7], textColor: [0,0,0] }, styles: { font: 'helvetica', fontSize: 10 },
                    columnStyles: { 0: { cellWidth: 20, halign: 'center' }, 1: { cellWidth: 40 }, 2: { cellWidth: 'auto' } }
                });
                startY = doc.lastAutoTable.finalY + 15;
            });
            doc.save("Gepaeck_Checkliste.pdf");
        }
    </script>
</body>
</html>
